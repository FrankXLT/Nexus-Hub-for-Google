<style>
    :root {
    --bg-dark: #121212;
    --bg-panel: #1E1E1E;
    --text-main: #E0E0E0;
    --text-muted: #9E9E9E;
    --accent-blue: #4A90E2; 
    --accent-red: #E24A4A;  
    --accent-alert: #F5A623;
    --success: #27AE60;

    --primary-color: var(--accent-blue);
    --primary-hover: #357abd;
    --surface-color: var(--bg-panel);
    --background-color: var(--bg-dark);
    --border-color: #333;
    --text-primary: var(--text-main);
    --text-secondary: var(--text-muted);
    --success-color: var(--success);
    --warning-color: var(--accent-alert);
    --error-color: var(--accent-red);
    
    --sidebar-width: 280px;
    --header-height: 70px;
    
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--background-color);
    color: var(--text-primary);
    overflow: hidden;
  }

  .app-container {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background-color: var(--surface-color);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    z-index: 10;
  }

  .sidebar-header {
    height: var(--header-height);
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-color);
  }

  .sidebar-header h2 {
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--primary-color);
  }

  .nav-list {
    list-style: none;
    padding: 12px 0;
  }

  .nav-item {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: background-color 0.2s, color 0.2s;
  }

  .nav-item:hover {
    background-color: #f1f3f4;
  }

  .nav-item.active {
    color: var(--primary-color);
    background-color: #e8f0fe;
    font-weight: 500;
    border-top-right-radius: 24px;
    border-bottom-right-radius: 24px;
    margin-right: 8px;
  }

  /* Main Content */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .tab-content {
    display: none;
    height: 100%;
    flex-direction: column;
  }

  .tab-content.active {
    display: flex;
  }

  /* Split Pane */
  .split-pane {
    display: flex;
    height: 100%;
    width: 100%;
  }

  .pane {
    display: flex;
    flex-direction: column;
    background-color: var(--surface-color);
  }

  .pane-left {
    flex: 2;
    border-right: 1px solid var(--border-color);
    min-width: 300px;
  }

  .pane-right {
    flex: 1;
    background-color: var(--background-color);
    min-width: 250px;
  }

  .pane-header {
    height: var(--header-height);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-color);
    background-color: var(--surface-color);
  }

  .pane-header h3 {
    font-size: 1.1rem;
    font-weight: 500;
  }

  /* Data Grid */
  .table-container {
    flex: 1;
    overflow: auto;
    padding: 0;
  }

  .data-grid {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
  }

  .data-grid th, .data-grid td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
  }

  .data-grid th {
    position: sticky;
    top: 0;
    background-color: var(--surface-color);
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 0.875rem;
    z-index: 2;
    box-shadow: 0 1px 0 var(--border-color);
  }

  .data-grid tbody tr {
    cursor: pointer;
    transition: background-color 0.15s;
  }

  .data-grid tbody tr:hover {
    background-color: var(--background-color);
  }

  .data-grid tbody tr.selected {
    background-color: #e8f0fe;
  }

  /* Badges */
  .status-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .status-badge.processed { background-color: #e6f4ea; color: var(--success-color); }
  .status-badge.error { background-color: #fce8e6; color: var(--error-color); }
  .status-badge.pending { background-color: #fef7e0; color: var(--warning-color); }

  .json-chip {
    display: inline-block;
    padding: 2px 6px;
    margin: 2px;
    background-color: #f1f3f4;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    font-size: 0.75rem;
    font-family: monospace;
  }

  /* Details View */
  .details-content {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }

  .placeholder-text {
    color: var(--text-secondary);
    text-align: center;
    margin-top: 40px;
    font-style: italic;
  }

  .detail-group {
    margin-bottom: 20px;
    background: var(--surface-color);
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
  }

  .detail-group h4 {
    font-size: 0.875rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f1f3f4;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-weight: 500; color: var(--text-secondary); font-size: 0.875rem; }
  .detail-value { color: var(--text-primary); font-size: 0.875rem; word-break: break-word;}

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  .btn-primary { background-color: var(--primary-color); color: white; }
  .btn-primary:hover { background-color: var(--primary-hover); }

  /* Audit Timeline */
  .timeline-container {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
    background-color: var(--surface-color);
  }

  .timeline {
    list-style: none;
    position: relative;
  }
  
  .timeline::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    left: 20px;
    width: 2px;
    background: var(--border-color);
  }

  .timeline-event {
    position: relative;
    padding-left: 48px;
    margin-bottom: 24px;
  }

  .timeline-icon {
    position: absolute;
    left: 8px;
    top: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--surface-color);
    border: 2px solid var(--primary-color);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary-color);
  }

  .timeline-icon i { font-size: 14px; }
  
  .timeline-content {
    background: #f8f9fa;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 12px 16px;
  }

  .timeline-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 0.875rem;
  }
  
  .timeline-actor { font-weight: 500; color: var(--primary-color); }
  .timeline-date { color: var(--text-secondary); }
  .timeline-action { font-weight: 500; margin-bottom: 4px; }
  
  .timeline-diff {
    font-family: monospace;
    font-size: 0.75rem;
    background: #fff;
    padding: 8px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    overflow-x: auto;
    white-space: pre-wrap;
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #323232;
    color: white;
    padding: 12px 24px;
    border-radius: 4px;
    font-size: 0.875rem;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; pointer-events: auto; }

  /* UPGRADED: Top Bar & Search Area */
  .top-bar {
      background-color: var(--bg-panel);
      border-bottom: 1px solid #333;
      display: flex;
      flex-direction: column;
      padding: 15px 30px;
      gap: 12px;
  }

  .search-row {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
  }

  /* Omnibox Wrapper with embedded icons */
  .omnibox-wrapper {
      flex-grow: 1;
      max-width: 900px;
      display: flex;
      align-items: center;
      background-color: var(--bg-dark);
      border: 1px solid #444;
      border-radius: 24px;
      padding: 4px 16px;
      transition: border-color 0.2s;
  }

  .omnibox-wrapper:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
  }

  .search-icon { color: var(--text-muted); margin-right: 8px; }

  .omnibox {
      flex-grow: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 15px;
      padding: 10px 0;
      outline: none;
  }

  .omnibox-actions {
      display: flex;
      gap: 8px;
      margin-left: 10px;
  }

  .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
  }

  .icon-btn:hover { background-color: #333; color: white; }
  .icon-btn.save:hover { color: var(--success); }

  /* Interactive Search Chips */
  .chips-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-left: 42px; /* Aligns with input text */
  }

  .chip {
      background-color: #2A2A2A;
      border: 1px solid #444;
      color: var(--text-main);
      padding: 5px 12px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
  }

  .chip:hover { background-color: #383838; border-color: #555; }
  .chip.active { background-color: rgba(74, 144, 226, 0.15); border-color: var(--accent-blue); color: var(--accent-blue); }

  /* View Controls */
  .view-controls { display: flex; background: #121212; border-radius: 8px; padding: 4px; border: 1px solid #333; }
  .view-btn { background: transparent; color: var(--text-muted); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .view-btn.active { background: #333; color: white; }

  /* Blueprint Sidebar Overrides */
  .sidebar { width: 280px; background-color: var(--bg-panel); display: flex; flex-direction: column; border-right: 1px solid #333; transition: width 0.3s ease; overflow-x: hidden; }
  .sidebar.collapsed { width: 70px; }
  .brand-header { height: 70px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; gap: 15px; white-space: nowrap; }
  .menu-toggle { background: none; border: none; color: white; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; }
  .menu-toggle:hover { color: var(--accent-blue); }
  .brand-text { font-size: 20px; font-weight: bold; color: white; transition: opacity 0.2s; }
  .sidebar.collapsed .brand-text, .sidebar.collapsed .nav-text, .sidebar.collapsed .system-toggles { opacity: 0; pointer-events: none; display: none; }
  
  .nav-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; transition: background 0.2s; color: var(--text-main); white-space: nowrap; }
  .nav-icon { min-width: 24px; display: flex; justify-content: center; margin-right: 15px; }
  .nav-item.active { background-color: #333; color: white; border-radius: 6px; margin-right: 0;}
  .nav-item:hover:not(.active) { background-color: #2A2A2A; }

  /* Old specific dark mode fixes */
  .data-grid th { background-color: var(--bg-panel); color: var(--text-muted); }
  .data-grid tbody tr:hover { background-color: #2A2A2A; }
  .data-grid tbody tr.selected { background-color: #333; }
  .detail-group { background: var(--bg-panel); border: 1px solid #333; }
  .detail-row { border-bottom: 1px solid #333; }
  .json-chip { background-color: #333; border-color: #444; color: var(--text-main); }
  
  /* Inputs and Textareas in dark mode */
  input[type="text"], select, textarea {
    background-color: var(--bg-dark);
    color: var(--text-main);
    border: 1px solid #444;
  }
  
  /* For elements with direct hardcoded background colors */
  .tab-content [style*="background: #fff"], 
  .tab-content [style*="background-color: #fff"], 
  .tab-content [style*="background-color: #fefefe"] {
      background-color: var(--bg-panel) !important;
      border-color: #444 !important;
  }
  
  /* Modals */
  .modal > div {
      background-color: var(--bg-panel) !important;
      border-color: #444 !important;
  }

  /* Table Container */
  .table-container { background-color: var(--bg-dark); }

  /* Knowledge Grid */
  .grid-container { padding: 30px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; align-content: start; height: 100%; }
  
  @media (max-width: 768px) {
      .grid-container { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
      .chips-row { margin-left: 0; }
  }

  /* Artifact Cards */
  .card { background-color: var(--bg-panel); border-radius: 8px; padding: 20px; position: relative; border-left: 4px solid #444; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; cursor: pointer;}
  .card.source-drive { border-left-color: var(--accent-blue); }
  .card.source-gmail { border-left-color: var(--accent-red); }
  .card.stacked::before { content: ''; position: absolute; top: -5px; right: -5px; left: 5px; bottom: 5px; border-radius: 8px; background-color: #252525; border-left: 4px solid var(--accent-red); z-index: -1; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px;}
  .card-title { font-weight: 600; font-size: 16px; margin: 0; line-height: 1.3; }
  .card-desc { font-size: 14px; color: #CCC; line-height: 1.4; flex-grow: 1;}
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 12px; background-color: #333; color: var(--text-muted); white-space: nowrap; }
  .tag.alert { background-color: rgba(245, 166, 35, 0.2); color: var(--accent-alert); }
  .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 15px; display: flex; justify-content: space-between; align-items: center;}
  .lineage-badge { font-size: 11px; color: var(--accent-blue); cursor: pointer; display: flex; align-items: center; gap: 4px;}

</style>

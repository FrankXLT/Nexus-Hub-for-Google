<style>
  :root {
    --primary-color: #1a73e8;
    --primary-hover: #1557b0;
    --surface-color: #ffffff;
    --background-color: #f8f9fa;
    --border-color: #dadce0;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --success-color: #1e8e3e;
    --warning-color: #f9ab00;
    --error-color: #d93025;
    
    --sidebar-width: 250px;
    --header-height: 64px;
    
    font-family: 'Roboto', 'Segoe UI', Tahoma, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--background-color);
    color: var(--text-primary);
    overflow: hidden;
  }

  .app-container {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background-color: var(--surface-color);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    z-index: 10;
  }

  .sidebar-header {
    height: var(--header-height);
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-color);
  }

  .sidebar-header h2 {
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--primary-color);
  }

  .nav-list {
    list-style: none;
    padding: 12px 0;
  }

  .nav-item {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: background-color 0.2s, color 0.2s;
  }

  .nav-item:hover {
    background-color: #f1f3f4;
  }

  .nav-item.active {
    color: var(--primary-color);
    background-color: #e8f0fe;
    font-weight: 500;
    border-top-right-radius: 24px;
    border-bottom-right-radius: 24px;
    margin-right: 8px;
  }

  /* Main Content */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .tab-content {
    display: none;
    height: 100%;
    flex-direction: column;
  }

  .tab-content.active {
    display: flex;
  }

  /* Split Pane */
  .split-pane {
    display: flex;
    height: 100%;
    width: 100%;
  }

  .pane {
    display: flex;
    flex-direction: column;
    background-color: var(--surface-color);
  }

  .pane-left {
    flex: 2;
    border-right: 1px solid var(--border-color);
    min-width: 300px;
  }

  .pane-right {
    flex: 1;
    background-color: var(--background-color);
    min-width: 250px;
  }

  .pane-header {
    height: var(--header-height);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-color);
    background-color: var(--surface-color);
  }

  .pane-header h3 {
    font-size: 1.1rem;
    font-weight: 500;
  }

  /* Data Grid */
  .table-container {
    flex: 1;
    overflow: auto;
    padding: 0;
  }

  .data-grid {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
  }

  .data-grid th, .data-grid td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
  }

  .data-grid th {
    position: sticky;
    top: 0;
    background-color: var(--surface-color);
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 0.875rem;
    z-index: 2;
    box-shadow: 0 1px 0 var(--border-color);
  }

  .data-grid tbody tr {
    cursor: pointer;
    transition: background-color 0.15s;
  }

  .data-grid tbody tr:hover {
    background-color: var(--background-color);
  }

  .data-grid tbody tr.selected {
    background-color: #e8f0fe;
  }

  /* Badges */
  .status-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .status-badge.processed { background-color: #e6f4ea; color: var(--success-color); }
  .status-badge.error { background-color: #fce8e6; color: var(--error-color); }
  .status-badge.pending { background-color: #fef7e0; color: var(--warning-color); }

  .json-chip {
    display: inline-block;
    padding: 2px 6px;
    margin: 2px;
    background-color: #f1f3f4;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    font-size: 0.75rem;
    font-family: monospace;
  }

  /* Details View */
  .details-content {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }

  .placeholder-text {
    color: var(--text-secondary);
    text-align: center;
    margin-top: 40px;
    font-style: italic;
  }

  .detail-group {
    margin-bottom: 20px;
    background: var(--surface-color);
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
  }

  .detail-group h4 {
    font-size: 0.875rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f1f3f4;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-weight: 500; color: var(--text-secondary); font-size: 0.875rem; }
  .detail-value { color: var(--text-primary); font-size: 0.875rem; word-break: break-word;}

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  .btn-primary { background-color: var(--primary-color); color: white; }
  .btn-primary:hover { background-color: var(--primary-hover); }

  /* Audit Timeline */
  .timeline-container {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
    background-color: var(--surface-color);
  }

  .timeline {
    list-style: none;
    position: relative;
  }
  
  .timeline::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    left: 20px;
    width: 2px;
    background: var(--border-color);
  }

  .timeline-event {
    position: relative;
    padding-left: 48px;
    margin-bottom: 24px;
  }

  .timeline-icon {
    position: absolute;
    left: 8px;
    top: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--surface-color);
    border: 2px solid var(--primary-color);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary-color);
  }

  .timeline-icon i { font-size: 14px; }
  
  .timeline-content {
    background: #f8f9fa;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 12px 16px;
  }

  .timeline-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 0.875rem;
  }
  
  .timeline-actor { font-weight: 500; color: var(--primary-color); }
  .timeline-date { color: var(--text-secondary); }
  .timeline-action { font-weight: 500; margin-bottom: 4px; }
  
  .timeline-diff {
    font-family: monospace;
    font-size: 0.75rem;
    background: #fff;
    padding: 8px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    overflow-x: auto;
    white-space: pre-wrap;
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #323232;
    color: white;
    padding: 12px 24px;
    border-radius: 4px;
    font-size: 0.875rem;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; pointer-events: auto; }
</style>

<script>
/**
 * Client-Side Actions and DOM Manipulation
 */
const appActions = {
  
  init: function() {
    this.loadUserPreferences(); // Will handle boot routing
    this.refreshData(); // Fetch initial data
    this.loadPipelineSettings(); // Fetch UI configurations
    this.loadQuotaGovernor();
    this.startHealthPing();
    this.setupOmnibox();
  },

  loadUserPreferences: function() {
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success && result.data && result.data.default_view) {
          const view = result.data.default_view; // e.g., 'mission-control', 'threads', 'grid'
          if(view === 'mission-control') {
            appState.switchTab('mission-control');
            this.renderHeatmap();
          } else if(view === 'threads') {
            appState.switchTab('grid'); // Default tab that contains view-controls
            this.switchWorkspaceView('threads');
          } else {
            appState.switchTab('grid');
            this.switchWorkspaceView('grid');
          }
        } else {
          // Default fallback
          appState.switchTab('mission-control');
          this.renderHeatmap();
        }
      })
      .withFailureHandler(() => {
        appState.switchTab('mission-control');
        this.renderHeatmap();
      })
      .getUserPreferences();
  },

  renderHeatmap: function() {
    this.showToast("Loading Heatmap...");
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success && result.data) {
          this.buildHeatmap(result.data);
        } else {
          // Fallback mock data
          const mockData = [
            { x: '2026-01', y: 'Finance', v: 45 },
            { x: '2026-01', y: 'HR', v: 12 },
            { x: '2026-02', y: 'Finance', v: 50 },
            { x: '2026-02', y: 'HR', v: 18 },
            { x: '2026-03', y: 'Finance', v: 60 },
            { x: '2026-03', y: 'System', v: 5 }
          ];
          this.buildHeatmap(mockData);
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .getHeatmapData();
  },

  buildHeatmap: function(data) {
    if(window.heatmapChartInst) window.heatmapChartInst.destroy();
    const ctx = document.getElementById('heatmapChart').getContext('2d');
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-main').trim() || '#fff';

    window.heatmapChartInst = new Chart(ctx, {
      type: 'matrix',
      data: {
        datasets: [{
          label: 'Activity Heatmap',
          data: data,
          backgroundColor(context) {
            const value = context.dataset.data[context.dataIndex].v;
            const alpha = Math.min(value / 100, 1);
            return `rgba(74, 144, 226, ${alpha})`; // using --accent-blue
          },
          borderColor: '#333',
          borderWidth: 1,
          width: ({chart}) => (chart.chartArea || {}).width / 6 - 1,
          height: ({chart}) => (chart.chartArea || {}).height / 4 - 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title() { return ''; },
              label(context) {
                const item = context.dataset.data[context.dataIndex];
                return `${item.y} (${item.x}): ${item.v} items`;
              }
            }
          }
        },
        scales: {
          x: {
            type: 'category',
            labels: [...new Set(data.map(d => d.x))].sort(),
            ticks: { color: textColor }
          },
          y: {
            type: 'category',
            labels: [...new Set(data.map(d => d.y))].sort(),
            ticks: { color: textColor }
          }
        },
        onClick: (e, elements) => {
          if (elements.length > 0) {
            const element = elements[0];
            const datasetIndex = element.datasetIndex;
            const index = element.index;
            const dataItem = window.heatmapChartInst.data.datasets[datasetIndex].data[index];
            const dateStr = dataItem.x;
            
            const input = document.getElementById('ast-input');
            input.value = `Date:${dateStr}`;
            appActions.executeASTSearch(input.value);
            
            appState.switchTab('grid');
            appActions.switchWorkspaceView('grid');
          }
        }
      }
    });
  },

  setupOmnibox: function() {
    const input = document.getElementById('ast-input');
    
    input.addEventListener('keydown', (e) => {
       if (e.key === 'Tab') {
          e.preventDefault();
          let val = input.value;
          let parts = val.split(' AND ');
          let lastWord = parts.pop().trim();
          
          if (lastWord.length > 1) {
             let matched = false;
             let searchStr = lastWord.toLowerCase();
             // Simple basic prediction logic based on correspondents in mock/state
             Object.keys(appState.taxonomyTree).forEach(cat => {
               Object.keys(appState.taxonomyTree[cat]).forEach(corr => {
                 if (corr.toLowerCase().startsWith(searchStr)) {
                   parts.push("Correspondent:" + corr);
                   matched = true;
                 }
               });
             });
             
             if (!matched && searchStr === 'med') {
               parts.push("Correspondent:MedStar Health");
               matched = true;
             }
             
             if (matched) {
               input.value = parts.join(' AND ');
             }
          }
       } else if (e.key === 'Enter') {
          e.preventDefault();
          this.executeASTSearch(input.value);
       }
    });
  },

  executeASTSearch: function(query) {
    if (!query.trim()) return this.refreshData();
    this.showToast("Executing AST Search...");
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success && result.data && result.data.results) {
           appState.setArtifacts(result.data.results);
           this.renderGrid();
           this.showToast("Search complete.");
        } else {
           // Provide a fallback for local testing without real API
           this.showToast("AST Search mock complete.");
        }
      })
      .withFailureHandler((err) => this.showToast("Error: " + err.message))
      .searchArtifacts(query);
  },

  startHealthPing: function() {
    this.pingHealth();
    setInterval(() => this.pingHealth(), 60000);
  },

  pingHealth: function() {
    google.script.run
      .withSuccessHandler((result) => {
        const badge = document.getElementById('system-health-badge');
        const text = document.getElementById('health-status-text');
        if (result && result.status === 'success') {
           badge.style.backgroundColor = 'var(--success)';
           text.textContent = 'Health: OK';
           badge.title = 'System is operating normally.';
        } else {
           badge.style.backgroundColor = 'var(--accent-red)';
           text.textContent = 'Health: Error';
           badge.title = 'Failed to reach API';
        }
      })
      .withFailureHandler((error) => {
        const badge = document.getElementById('system-health-badge');
        const text = document.getElementById('health-status-text');
        badge.style.backgroundColor = 'var(--accent-red)';
        text.textContent = 'Health: Error';
        badge.title = error.message;
      })
      .pingHealthAPI();
  },

  showToast: function(message, duration = 3000) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, duration);
  },

  
  loadQuotaGovernor: function() {
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.status === 'success' && result.quota) {
          const used = result.quota.used;
          const limit = result.quota.limit;
          const percent = Math.min((used / limit) * 100, 100);
          
          document.getElementById('quota-used').textContent = used;
          document.getElementById('quota-limit').textContent = limit;
          
          const bar = document.getElementById('quota-bar');
          bar.style.width = percent + '%';
          
          const statusEl = document.getElementById('quota-status');
          if(percent >= 70) {
            statusEl.textContent = 'Throttled (Historical)';
            statusEl.style.color = '#d93025';
            bar.style.background = '#d93025';
          } else {
            statusEl.textContent = 'Active (Priority & Historical)';
            statusEl.style.color = '#1a73e8';
            bar.style.background = '#1a73e8';
          }
        }
      })
      .getQuotaGovernor();
  },
  loadPipelineSettings: function() {
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.status === 'success' && result.settings) {
          const s = result.settings;
          
          // Phase 1
          if(s.ui_gmail_filters) {
            document.getElementById('filter-promotions').checked = s.ui_gmail_filters.includes('CATEGORY_PROMOTIONS');
            document.getElementById('filter-social').checked = s.ui_gmail_filters.includes('CATEGORY_SOCIAL');
            document.getElementById('filter-forums').checked = s.ui_gmail_filters.includes('CATEGORY_FORUMS');
            document.getElementById('filter-updates').checked = s.ui_gmail_filters.includes('CATEGORY_UPDATES');
          }
          
          // Phase 2
          if(s.ui_ai_config) {
            if(s.ui_ai_config.drive_model) document.getElementById('ai-drive-model').value = s.ui_ai_config.drive_model;
            if(s.ui_ai_config.gmail_model) document.getElementById('ai-gmail-model').value = s.ui_ai_config.gmail_model;
          }
          
          // Phase 3
          if(s.ui_post_processing) {
            document.getElementById('post-auto-archive').checked = !!s.ui_post_processing.auto_archive_gmail;
            document.getElementById('post-quarantine').checked = !!s.ui_post_processing.quarantine_unconfident;
          }

          if(s.feature_retention_sweeper) {
            document.getElementById('toggle-retention').checked = (s.feature_retention_sweeper === '1' || s.feature_retention_sweeper === 'true');
          }
          if(s.feature_drive_relocator) {
            document.getElementById('toggle-relocator').checked = (s.feature_drive_relocator === '1' || s.feature_drive_relocator === 'true');
          }
          if(s.feature_materialization) {
            document.getElementById('toggle-materialization').checked = (s.feature_materialization === '1' || s.feature_materialization === 'true');
          }
          if(s.feature_google_tasks) {
            document.getElementById('toggle-tasks').checked = (s.feature_google_tasks === '1' || s.feature_google_tasks === 'true');
          }
        }
      })
      .getPipelineSettings();
  },

  updateSafeMode: function(key, isChecked) {
    this.showToast(`Updating ${key}...`);
    const payload = {
      settings: {
        [key]: isChecked ? '1' : '0'
      }
    };
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success) {
          this.showToast("Safe Mode setting saved.");
        } else {
          this.showToast("Failed to save Safe Mode setting.");
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .updateSafeMode(payload);
  },

  savePipelineSettings: function() {
    this.showToast("Saving Pipeline Config...");
    
    const ui_gmail_filters = [];
    if(document.getElementById('filter-promotions').checked) ui_gmail_filters.push('CATEGORY_PROMOTIONS');
    if(document.getElementById('filter-social').checked) ui_gmail_filters.push('CATEGORY_SOCIAL');
    if(document.getElementById('filter-forums').checked) ui_gmail_filters.push('CATEGORY_FORUMS');
    if(document.getElementById('filter-updates').checked) ui_gmail_filters.push('CATEGORY_UPDATES');

    const ui_ai_config = {
      drive_model: document.getElementById('ai-drive-model').value,
      gmail_model: document.getElementById('ai-gmail-model').value
    };

    const ui_post_processing = {
      auto_archive_gmail: document.getElementById('post-auto-archive').checked,
      quarantine_unconfident: document.getElementById('post-quarantine').checked
    };

    const payload = {
      settings: {
        ui_gmail_filters: ui_gmail_filters,
        ui_ai_config: ui_ai_config,
        ui_post_processing: ui_post_processing,
        drive_permanent_archive_id: document.getElementById('drive-archive-id').value
      }
    };

    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success) {
          this.showToast("Pipeline Config Saved.");
        } else {
          this.showToast("Failed to save: " + (result.error || result.data?.detail || "Unknown error"));
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .savePipelineSettings(payload);
  },

  queueHistoricalImport: function() {
    const query = document.getElementById('historical-search').value;
    if(!query) {
      this.showToast("Please enter a search query.");
      return;
    }
    this.showToast("Queueing historical import...");
    
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success && result.data && result.data.status === 'success') {
          this.showToast("Import queued: " + result.data.queued + " items.");
          const countEl = document.getElementById('queue-pending-count');
          countEl.textContent = parseInt(countEl.textContent) + result.data.queued;
        } else {
          this.showToast("Failed to queue: " + (result.error || result.data?.error || "Unknown"));
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .queueHistoricalImport(query);
  },

  /**
   * Generates mock data for development.
   * In a real flow, this would call `google.script.run.getNexusData(...)`
   */
  refreshData: function() {
    this.showToast("Syncing with Nexus Hub...");
    
    // Simulated fetch delay
    setTimeout(() => {
      const mockArtifacts = [
        {
          artifact_id: 'doc_12345',
          category: 'Finance', correspondent: 'AWS', purpose: 'Invoice',
          taxonomy: 'Finance / AWS / Invoice',
          summary: 'AWS Monthly Billing - October 2026',
          status: 'PROCESSED',
          operation_cost: 15,
          custom_data: { title: 'AWS Oct 2026', total_amount: '$145.20', due_date: '2026-11-01' }
        },
        {
          artifact_id: 'mail_67890',
          category: 'HR', correspondent: 'Stripe', purpose: 'Update',
          taxonomy: 'HR / Stripe / Update',
          summary: 'Stripe API Terms of Service Update',
          status: 'PROCESSED',
          operation_cost: 8,
          custom_data: { requires_action: false, impact: 'Low' }
        },
        {
          artifact_id: 'doc_55555',
          category: '', correspondent: '', purpose: '',
          taxonomy: 'UNKNOWN',
          summary: 'Scanned Image 001',
          status: 'ERROR_STAGE_1_FAILED',
          operation_cost: 3,
          custom_data: { error: 'Illegible OCR' }
        }
      ];

      const mockHistory = [
        {
          log_id: 1,
          artifact_id: 'doc_12345',
          timestamp: Date.now() / 1000 - 3600,
          actor: 'LLM_ENGINE',
          action_type: 'AI_EXTRACTION',
          previous_state: {},
          new_state: { title: 'AWS Oct 2026', total_amount: '$145.20' }
        }
      ];

      const mockTaxonomy = {
        "Finance": { "AWS": [{name: "Invoice", is_global: false}, {name: "Receipt", is_global: true}] },
        "HR": { "Stripe": [{name: "Update", is_global: false}] },
        "System": { "Global": [{name: "Bill / Statement", is_global: true}, {name: "Policy / Terms Update", is_global: true}] }
      };

      const mockZeroTrust = [
        { id: 1, type: 'Purpose', path: 'Finance / UnknownVendor / Receipt', is_gmail_enabled: false, is_drive_enabled: false },
        { id: 2, type: 'Correspondent', path: 'Operations / NewCorp', is_gmail_enabled: false, is_drive_enabled: false }
      ];

      appState.taxonomyTree = mockTaxonomy;
      appState.zeroTrustQueue = mockZeroTrust;
      appState.setArtifacts(mockArtifacts);
      appState.setHistory(mockHistory);
      
      this.populateCategoryDropdown();
      this.renderZeroTrustQueue();
      this.renderGrid();
      this.updateBulkEstimate();
      this.showToast("Data Refreshed", 2000);
    }, 800);
  },

  populateCategoryDropdown: function() {
    const catSelect = document.getElementById('filter-category');
    catSelect.innerHTML = '<option value="">All Categories</option>';
    Object.keys(appState.taxonomyTree).forEach(cat => {
      catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
  },

  onCategoryChange: function() {
    const catSelect = document.getElementById('filter-category');
    const corrSelect = document.getElementById('filter-correspondent');
    const purpSelect = document.getElementById('filter-purpose');
    
    corrSelect.innerHTML = '<option value="">All Correspondents</option>';
    purpSelect.innerHTML = '<option value="">All Purposes</option>';
    purpSelect.disabled = true;

    const cat = catSelect.value;
    if (cat && appState.taxonomyTree[cat]) {
      corrSelect.disabled = false;
      Object.keys(appState.taxonomyTree[cat]).forEach(corr => {
        corrSelect.innerHTML += `<option value="${corr}">${corr}</option>`;
      });
    } else {
      corrSelect.disabled = true;
    }
    this.applyFilters();
  },

  onCorrespondentChange: function() {
    const catSelect = document.getElementById('filter-category');
    const corrSelect = document.getElementById('filter-correspondent');
    const purpSelect = document.getElementById('filter-purpose');
    
    purpSelect.innerHTML = '<option value="">All Purposes</option>';

    const cat = catSelect.value;
    const corr = corrSelect.value;
    
    if (cat && corr && appState.taxonomyTree[cat][corr]) {
      purpSelect.disabled = false;
      appState.taxonomyTree[cat][corr].forEach(purp => {
        const purpName = typeof purp === 'object' ? purp.name : purp;
        purpSelect.innerHTML += `<option value="${purpName}">${purpName}</option>`;
      });
    } else {
      purpSelect.disabled = true;
    }
    this.applyFilters();
  },

  renderZeroTrustQueue: function() {
    const container = document.getElementById('zero-trust-queue');
    container.innerHTML = '';
    
    const quarantined = appState.artifacts.filter(a => a.status === 'QUARANTINED');
    
    if (quarantined.length === 0) {
      container.innerHTML = '<p class="placeholder-text">Queue is empty. No quarantined items.</p>';
      return;
    }

    const clusters = {};
    quarantined.forEach(art => {
       const cd = art.custom_data || {};
       const correspondent = cd.consensus_correspondent || cd.proposed_correspondent || 'Unknown Entity';
       const domain = cd.sender_domain || cd.sender || 'Unknown Sender';
       const key = correspondent + '|' + domain;
       
       if(!clusters[key]) {
           clusters[key] = {
               entity: correspondent,
               domain: domain,
               artifacts: []
           };
       }
       clusters[key].artifacts.push(art);
    });

    let html = '<div class="grid-container" style="display:grid; gap:16px; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">';
    Object.values(clusters).forEach((cluster, index) => {
        html += `
          <div class="card stacked" onclick="appActions.openClusterDrawer(${index})" style="cursor: pointer; border-left: 4px solid var(--accent-blue);">
              <div class="card-header">
                  <h3 class="card-title">${cluster.entity}</h3>
                  <span class="tag alert">${cluster.artifacts.length} Pending</span>
              </div>
              <div class="card-desc" style="margin-top: 8px;">Originating Domain: <strong>${cluster.domain}</strong></div>
              <div class="card-meta" style="margin-top: 12px; display:flex; justify-content:space-between;">
                  <span>Cluster Aggregation</span>
                  <span style="color:var(--accent-red);">Review Required</span>
              </div>
          </div>
        `;
    });
    html += '</div>';
    
    appState.currentClusters = Object.values(clusters);
    container.innerHTML = html;
  },

  openClusterDrawer: function(index) {
      const cluster = appState.currentClusters[index];
      if(!cluster) return;
      
      const pane = document.getElementById('zt-details-view');
      if(!pane) return;

      let listHtml = cluster.artifacts.map(art => {
          const title = (art.custom_data && art.custom_data.title) || art.summary || art.artifact_id;
          return \`<li style="font-size:0.875rem; margin-bottom:4px;">\${title}</li>\`;
      }).join('');

      const idsJson = JSON.stringify(cluster.artifacts.map(a => a.artifact_id)).replace(/"/g, '&quot;');

      pane.innerHTML = \`
        <div class="detail-group">
          <h4>Cluster Context</h4>
          <p style="font-size:0.875rem; margin-bottom: 4px;"><strong>Proposed Entity:</strong> \${cluster.entity}</p>
          <p style="font-size:0.875rem; margin-bottom: 12px;"><strong>Sender:</strong> \${cluster.domain}</p>
          <p style="font-size:0.875rem; margin-top: 12px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 4px;">Affected Documents:</p>
          <ul style="padding-left: 20px; color: var(--text-muted); max-height: 250px; overflow-y: auto;">
             \${listHtml}
          </ul>
        </div>
        <div class="detail-group" style="margin-top: 24px; display: flex; flex-direction: column; gap: 12px;">
          <button class="btn btn-primary" onclick="appActions.approveCluster('\${cluster.entity}', '\${idsJson}')" style="width: 100%;">Approve Cluster & Map All</button>
          <button class="btn btn-secondary" onclick="appActions.rejectCluster('\${idsJson}')" style="width: 100%;">Reject Cluster</button>
        </div>
      \`;
  },
  
  approveCluster: function(entity, idsJsonStr) {
      const ids = JSON.parse(idsJsonStr.replace(/&quot;/g, '"'));
      const payload = {
          instruction: "Approve cluster and map to " + entity,
          artifact_ids: ids
      };
      this.showToast("Approving cluster...");
      google.script.run
        .withSuccessHandler((result) => {
            if(result && result.success) {
                this.showToast("Cluster Approved.");
                // Remove approved items from local state mock
                appState.artifacts = appState.artifacts.filter(a => !ids.includes(a.artifact_id));
                this.renderZeroTrustQueue();
                document.getElementById('zt-details-view').innerHTML = '<p class="placeholder-text">Select a cluster to view details</p>';
            } else {
                this.showToast("Failed to approve cluster.");
            }
        })
        .withFailureHandler((err) => this.showToast("Error: " + err.message))
        .submitZeroShotRule(payload);
  },
  
  rejectCluster: function(idsJsonStr) {
      const ids = JSON.parse(idsJsonStr.replace(/&quot;/g, '"'));
      const payload = {
          instruction: "Reject cluster mapping",
          artifact_ids: ids
      };
      this.showToast("Rejecting cluster...");
      google.script.run
        .withSuccessHandler((result) => {
            if(result && result.success) {
                this.showToast("Cluster Rejected.");
                appState.artifacts = appState.artifacts.filter(a => !ids.includes(a.artifact_id));
                this.renderZeroTrustQueue();
                document.getElementById('zt-details-view').innerHTML = '<p class="placeholder-text">Select a cluster to view details</p>';
            } else {
                this.showToast("Failed to reject cluster.");
            }
        })
        .withFailureHandler((err) => this.showToast("Error: " + err.message))
        .submitZeroShotRule(payload);
  },

  updateBulkEstimate: function() {
    const estimateSpan = document.getElementById('bulk-estimate');
    const valueSpan = document.getElementById('bulk-cost-value');
    
    if (appState.selectedIds.size === 0) {
      estimateSpan.style.display = 'none';
      return;
    }

    let totalCost = 0;
    appState.selectedIds.forEach(id => {
      const art = appState.getArtifact(id);
      if (art && art.operation_cost) totalCost += art.operation_cost;
    });

    valueSpan.textContent = totalCost;
    estimateSpan.style.display = 'inline';
  },

  applyFilters: function() {
    this.renderGrid();
  },

  renderGrid: function() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';
    
    const filterCat = document.getElementById('filter-category').value;
    const filterCorr = document.getElementById('filter-correspondent').value;
    const filterPurp = document.getElementById('filter-purpose').value;
    const filterJson = (document.getElementById('filter-json').value || '').toLowerCase();

    appState.artifacts.forEach(artifact => {
      
      // Filter Logic
      if (filterCat && artifact.category !== filterCat) return;
      if (filterCorr && artifact.correspondent !== filterCorr) return;
      if (filterPurp && artifact.purpose !== filterPurp) return;
      
      if (filterJson) {
        let matchJson = false;
        if (artifact.custom_data) {
           matchJson = Object.keys(artifact.custom_data).some(k => k.toLowerCase().includes(filterJson));
        }
        if (!matchJson) return;
      }

      const card = document.createElement('div');
      card.className = `card ${artifact.artifact_id.startsWith('doc_') ? 'source-drive' : 'source-gmail'}`;
      if (artifact.parent_artifact_id) {
          card.classList.add('stacked');
      }
      
      const isChecked = appState.selectedIds.has(artifact.artifact_id);
      if (isChecked) {
          card.style.border = '2px solid var(--accent-blue)';
      }

        if(e.target.tagName !== 'INPUT') {
           if (e.shiftKey || e.ctrlKey || e.metaKey) {

               appActions.updateBulkEstimate();
               appActions.renderDetailsPane();

               appState.selectArtifact(artifact.artifact_id);

      if (artifact.status.includes('ERROR') || (artifact.custom_data && artifact.custom_data.requires_action)) {

      if (artifact.timestamp) {

          dateStr = 'Just now';

      let lineageHtml = artifact.parent_artifact_id ? `<span class="lineage-badge" title="Original Email: ${artifact.parent_artifact_id}">🔗 PDF</span>` : `<span>${artifact.status}</span>`;

      card.innerHTML = `

    select.innerHTML = '';

    let specificHtml = '<optgroup label="Category-Specific">';
    
    // Parse taxonomy tree
    Object.keys(appState.taxonomyTree).forEach(cat => {
      Object.keys(appState.taxonomyTree[cat]).forEach(corr => {
        appState.taxonomyTree[cat][corr].forEach(purp => {
           if (typeof purp === 'object') {
             if (purp.is_global) {
               if(!globalHtml.includes('value="' + purp.name + '"')) {
                 globalHtml += `<option value="${purp.name}">${purp.name}</option>`;
               }
             } else {
               specificHtml += `<option value="${purp.name}">${purp.name} (${cat} / ${corr})</option>`;
             }
           } else {
             specificHtml += `<option value="${purp}">${purp} (${cat} / ${corr})</option>`;
           }
        });
      });
    });
    
    globalHtml += '</optgroup>';
    specificHtml += '</optgroup>';

    const aiLoading = document.createElement('div');
    aiLoading.style.cssText = "align-self: flex-start; background: #f5f5f5; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 80%; color: #666;";

      .withSuccessHandler((result) => {

        const aiMsg = document.createElement('div');
        aiMsg.style.cssText = "align-self: flex-start; background: #f5f5f5; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 80%;";

  hexToRgba: function(hex, opacity) {
    hex = hex.replace('#', '');
    if (hex.length === 3) {
      hex = hex.split('').map(char => char + char).join('');
    }
    const r = parseInt(hex.substring(0, 2), 16);
    const g = parseInt(hex.substring(2, 4), 16);
    const b = parseInt(hex.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
  },

          google.charts.load('current', {'packages':['sankey']});

            const rows = rawData.map(row => {
              const color = appActions.hexToRgba(row.color || '#4A90E2', 0.45);
              return [row.source, row.target, row.weight, `<div>${row.weight} items</div>`, color];
            });
            
            data.addRows(rows);

            var colors = ['#a6cee3', '#b2df8a', '#fb9a99', '#fdbf6f',

                },
                link: {
                  colorMode: 'source'
                }
              }
            };

            var chart = new google.visualization.Sankey(document.getElementById('sankey_chart'));
            
            google.visualization.events.addListener(chart, 'select', function() {
              var selection = chart.getSelection();
              if (selection.length > 0 && selection[0].name) {
                const nodeName = selection[0].name;
                const input = document.getElementById('ast-input');
                input.value = `Correspondent:${nodeName}`;

          google.charts.load('current', {'packages':['sankey']});
          google.charts.setOnLoadCallback(() => {
            var data = new google.visualization.DataTable();
            data.addColumn('string', 'From');
            data.addColumn('string', 'To');
            data.addColumn('number', 'Weight');
            data.addColumn({type: 'string', role: 'tooltip', p: {html: true}});
            data.addColumn({type: 'string', role: 'style'});
            data.addRows([
              ['AWS', 'Invoice', 50, '50', appActions.hexToRgba('#FF9900', 0.45)],
              ['AWS', 'Receipt', 20, '20', appActions.hexToRgba('#FF9900', 0.45)],
              ['Stripe', 'Update', 15, '15', appActions.hexToRgba('#008CDD', 0.45)]
            ]);

            var options = { width: '100%', height: '100%', sankey: { node: { label: { color: '#fff' } }, link: { colorMode: 'source' } } };
            var chart = new google.visualization.Sankey(document.getElementById('sankey_chart'));
            
            google.visualization.events.addListener(chart, 'select', function() {
              var selection = chart.getSelection();
              if (selection.length > 0 && selection[0].name) {
                const nodeName = selection[0].name;
                const input = document.getElementById('ast-input');
                input.value = `Correspondent:${nodeName}`;
                appActions.executeASTSearch(input.value);
                appActions.switchWorkspaceView('grid');
              }
            });

            chart.draw(data, options);
          });
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .getThreadsData();
  },

  toggleSidebar: function() { document.getElementById('sidebar').classList.toggle('collapsed'); },
  toggleChip: function(button, astString) {
      button.classList.toggle('active');
      const input = document.getElementById('ast-input');
      let currentVal = input.value.trim();

      if (button.classList.contains('active')) {
          if (!currentVal.includes(astString)) {
              input.value = currentVal ? `${currentVal} AND ${astString}` : astString;
          }
      } else {
          let regex = new RegExp(`( AND )?${astString}( AND )?`);
          input.value = currentVal.replace(regex, function(match, p1, p2) {
              return (p1 && p2) ? ' AND ' : '';
          }).trim();
      }
      input.focus();
  }
};

window.toggleSidebar = function() { appActions.toggleSidebar(); };
window.toggleChip = function(btn, str) { appActions.toggleChip(btn, str); };

</script>

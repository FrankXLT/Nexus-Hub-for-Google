<script>
/**
 * Client-Side Actions and DOM Manipulation
 */
const appActions = {
  
  init: function() {
    this.refreshData(); // Fetch initial data
    this.loadPipelineSettings(); // Fetch UI configurations
    this.loadQuotaGovernor();
  },

  showToast: function(message, duration = 3000) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, duration);
  },

  
  loadQuotaGovernor: function() {
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.status === 'success' && result.quota) {
          const used = result.quota.used;
          const limit = result.quota.limit;
          const percent = Math.min((used / limit) * 100, 100);
          
          document.getElementById('quota-used').textContent = used;
          document.getElementById('quota-limit').textContent = limit;
          
          const bar = document.getElementById('quota-bar');
          bar.style.width = percent + '%';
          
          const statusEl = document.getElementById('quota-status');
          if(percent >= 70) {
            statusEl.textContent = 'Throttled (Historical)';
            statusEl.style.color = '#d93025';
            bar.style.background = '#d93025';
          } else {
            statusEl.textContent = 'Active (Priority & Historical)';
            statusEl.style.color = '#1a73e8';
            bar.style.background = '#1a73e8';
          }
        }
      })
      .getQuotaGovernor();
  },
  loadPipelineSettings: function() {
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.status === 'success' && result.settings) {
          const s = result.settings;
          
          // Phase 1
          if(s.ui_gmail_filters) {
            document.getElementById('filter-promotions').checked = s.ui_gmail_filters.includes('CATEGORY_PROMOTIONS');
            document.getElementById('filter-social').checked = s.ui_gmail_filters.includes('CATEGORY_SOCIAL');
            document.getElementById('filter-forums').checked = s.ui_gmail_filters.includes('CATEGORY_FORUMS');
            document.getElementById('filter-updates').checked = s.ui_gmail_filters.includes('CATEGORY_UPDATES');
          }
          
          // Phase 2
          if(s.ui_ai_config) {
            if(s.ui_ai_config.drive_model) document.getElementById('ai-drive-model').value = s.ui_ai_config.drive_model;
            if(s.ui_ai_config.gmail_model) document.getElementById('ai-gmail-model').value = s.ui_ai_config.gmail_model;
          }
          
          // Phase 3
          if(s.ui_post_processing) {
            document.getElementById('post-auto-archive').checked = !!s.ui_post_processing.auto_archive_gmail;
            document.getElementById('post-quarantine').checked = !!s.ui_post_processing.quarantine_unconfident;
          }
        }
      })
      .getPipelineSettings();
  },

  savePipelineSettings: function() {
    this.showToast("Saving Pipeline Config...");
    
    const ui_gmail_filters = [];
    if(document.getElementById('filter-promotions').checked) ui_gmail_filters.push('CATEGORY_PROMOTIONS');
    if(document.getElementById('filter-social').checked) ui_gmail_filters.push('CATEGORY_SOCIAL');
    if(document.getElementById('filter-forums').checked) ui_gmail_filters.push('CATEGORY_FORUMS');
    if(document.getElementById('filter-updates').checked) ui_gmail_filters.push('CATEGORY_UPDATES');

    const ui_ai_config = {
      drive_model: document.getElementById('ai-drive-model').value,
      gmail_model: document.getElementById('ai-gmail-model').value
    };

    const ui_post_processing = {
      auto_archive_gmail: document.getElementById('post-auto-archive').checked,
      quarantine_unconfident: document.getElementById('post-quarantine').checked
    };

    const payload = {
      settings: {
        ui_gmail_filters: ui_gmail_filters,
        ui_ai_config: ui_ai_config,
        ui_post_processing: ui_post_processing,
        drive_permanent_archive_id: document.getElementById('drive-archive-id').value
      }
    };

    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success) {
          this.showToast("Pipeline Config Saved.");
        } else {
          this.showToast("Failed to save: " + (result.error || result.data?.detail || "Unknown error"));
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .savePipelineSettings(payload);
  },

  queueHistoricalImport: function() {
    const query = document.getElementById('historical-search').value;
    if(!query) {
      this.showToast("Please enter a search query.");
      return;
    }
    this.showToast("Queueing historical import...");
    
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success && result.data && result.data.status === 'success') {
          this.showToast("Import queued: " + result.data.queued + " items.");
          const countEl = document.getElementById('queue-pending-count');
          countEl.textContent = parseInt(countEl.textContent) + result.data.queued;
        } else {
          this.showToast("Failed to queue: " + (result.error || result.data?.error || "Unknown"));
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .queueHistoricalImport(query);
  },

  /**
   * Generates mock data for development.
   * In a real flow, this would call `google.script.run.getNexusData(...)`
   */

      const mockArtifacts = [

          status: 'PROCESSED',
          operation_cost: 15,
          custom_data: { title: 'AWS Oct 2026', total_amount: '$145.20', due_date: '2026-11-01' }
        },
        {
          artifact_id: 'mail_67890',
          category: 'HR', correspondent: 'Stripe', purpose: 'Update',
          taxonomy: 'HR / Stripe / Update',
          summary: 'Stripe API Terms of Service Update',
          status: 'PROCESSED',
          operation_cost: 8,
          custom_data: { requires_action: false, impact: 'Low' }
        },
        {
          artifact_id: 'doc_55555',
          category: '', correspondent: '', purpose: '',
          taxonomy: 'UNKNOWN',
          summary: 'Scanned Image 001',
          status: 'ERROR_STAGE_1_FAILED',
          operation_cost: 3,
          custom_data: { error: 'Illegible OCR' }
        }
      ];

      const mockHistory = [
        {
          log_id: 1,
          artifact_id: 'doc_12345',
          timestamp: Date.now() / 1000 - 3600,
          actor: 'LLM_ENGINE',
          action_type: 'AI_EXTRACTION',

      const mockZeroTrust = [

      appState.taxonomyTree = mockTaxonomy;

      appState.setHistory(mockHistory);

      this.renderZeroTrustQueue();

  },

  populateCategoryDropdown: function() {
    const catSelect = document.getElementById('filter-category');
    catSelect.innerHTML = '<option value="">All Categories</option>';
    Object.keys(appState.taxonomyTree).forEach(cat => {
      catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
  },

  onCategoryChange: function() {
    const catSelect = document.getElementById('filter-category');
    const corrSelect = document.getElementById('filter-correspondent');
    const purpSelect = document.getElementById('filter-purpose');
    
    corrSelect.innerHTML = '<option value="">All Correspondents</option>';
    purpSelect.innerHTML = '<option value="">All Purposes</option>';
    purpSelect.disabled = true;

    const cat = catSelect.value;
    if (cat && appState.taxonomyTree[cat]) {
      corrSelect.disabled = false;
      Object.keys(appState.taxonomyTree[cat]).forEach(corr => {
        corrSelect.innerHTML += `<option value="${corr}">${corr}</option>`;
      });
    } else {
      corrSelect.disabled = true;
    }
    this.applyFilters();
  },

  onCorrespondentChange: function() {
    const catSelect = document.getElementById('filter-category');
    const corrSelect = document.getElementById('filter-correspondent');
    const purpSelect = document.getElementById('filter-purpose');
    
    purpSelect.innerHTML = '<option value="">All Purposes</option>';

    const cat = catSelect.value;
    const corr = corrSelect.value;
    
    if (cat && corr && appState.taxonomyTree[cat][corr]) {
      purpSelect.disabled = false;
      appState.taxonomyTree[cat][corr].forEach(purp => {
        const purpName = typeof purp === 'object' ? purp.name : purp;
        purpSelect.innerHTML += `<option value="${purpName}">${purpName}</option>`;
      });
    } else {
      purpSelect.disabled = true;
    }
    this.applyFilters();
  },

  renderZeroTrustQueue: function() {
    const container = document.getElementById('zero-trust-queue');
    container.innerHTML = '';
    
    if (appState.zeroTrustQueue.length === 0) {
      container.innerHTML = '<p class="placeholder-text">Queue is empty. No quarantined items.</p>';
      return;
    }

    let html = '<table class="data-grid" style="width: 100%;"><thead><tr><th>Type</th><th>Path</th><th>Gmail Enabled</th><th>Drive Enabled</th><th>Action</th></tr></thead><tbody>';
    
    appState.zeroTrustQueue.forEach(item => {
      html += `
        <tr>
          <td>${item.type}</td>
          <td>${item.path}</td>
          <td style="text-align: center;"><input type="checkbox" ${item.is_gmail_enabled ? 'checked' : ''} onchange="appActions.toggleEcosystem(${item.id}, 'gmail', this.checked)"></td>
          <td style="text-align: center;"><input type="checkbox" ${item.is_drive_enabled ? 'checked' : ''} onchange="appActions.toggleEcosystem(${item.id}, 'drive', this.checked)"></td>
          <td><button class="btn btn-primary" onclick="appActions.approveZeroTrust(${item.id})" style="padding: 4px 8px; font-size: 0.8rem;">Save</button></td>
        </tr>
      `;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
  },

  toggleEcosystem: function(id, system, isChecked) {
    const item = appState.zeroTrustQueue.find(i => i.id === id);
    if (item) {
      if (system === 'gmail') item.is_gmail_enabled = isChecked;
      if (system === 'drive') item.is_drive_enabled = isChecked;
    }
  },

  approveZeroTrust: function(id) {
    const item = appState.zeroTrustQueue.find(i => i.id === id);
    if (item) {
      this.showToast(`Saved toggles for ${item.path}`);
      // In a real app, this would call google.script.run to update the DB
      appState.zeroTrustQueue = appState.zeroTrustQueue.filter(i => i.id !== id);
      this.renderZeroTrustQueue();
    }
  },

  updateBulkEstimate: function() {
    const estimateSpan = document.getElementById('bulk-estimate');
    const valueSpan = document.getElementById('bulk-cost-value');
    
    if (appState.selectedIds.size === 0) {
      estimateSpan.style.display = 'none';
      return;
    }

    let totalCost = 0;
    appState.selectedIds.forEach(id => {
      const art = appState.getArtifact(id);
      if (art && art.operation_cost) totalCost += art.operation_cost;
    });

    valueSpan.textContent = totalCost;
    estimateSpan.style.display = 'inline';
  },

  applyFilters: function() {
    this.renderGrid();
  },

  renderGrid: function() {
    const tbody = document.getElementById('grid-body');
    tbody.innerHTML = '';
    
    const filterCat = document.getElementById('filter-category').value;
    const filterCorr = document.getElementById('filter-correspondent').value;
    const filterPurp = document.getElementById('filter-purpose').value;
    const filterJson = (document.getElementById('filter-json').value || '').toLowerCase();

    appState.artifacts.forEach(artifact => {
      
      // Filter Logic
      if (filterCat && artifact.category !== filterCat) return;
      if (filterCorr && artifact.correspondent !== filterCorr) return;
      if (filterPurp && artifact.purpose !== filterPurp) return;
      
      if (filterJson) {
        let matchJson = false;
        if (artifact.custom_data) {
           matchJson = Object.keys(artifact.custom_data).some(k => k.toLowerCase().includes(filterJson));
        }
        if (!matchJson) return;
      }

      const tr = document.createElement('tr');
      tr.setAttribute('data-id', artifact.artifact_id);
      
      // Checkbox Logic
      const isChecked = appState.selectedIds.has(artifact.artifact_id) ? 'checked' : '';
      
      tr.onclick = (e) => {
        if(e.target.type !== 'checkbox') {
           appState.selectArtifact(artifact.artifact_id);
        }
      };

      // Status Badge
      let statusClass = 'pending';
      if (artifact.status.includes('PROCESSED')) statusClass = 'processed';
      if (artifact.status.includes('ERROR')) statusClass = 'error';

      // JSON Chips
      let customDataHtml = '';
      if (artifact.custom_data) {
        Object.keys(artifact.custom_data).forEach(key => {
          // Truncate long values
          let val = artifact.custom_data[key];
          if(typeof val === 'string' && val.length > 20) val = val.substring(0, 20) + '...';
          customDataHtml += `<span class="json-chip" style="margin-right: 4px; display: inline-block;">${key}: ${val}</span>`;
        });
      }

      tr.innerHTML = `
        <td style="width: 40px; text-align: center;"><input type="checkbox" onclick="appActions.toggleRowSelection('${artifact.artifact_id}', event)" ${isChecked}></td>
        <td><span style="font-family:monospace; color:var(--text-secondary);">${artifact.artifact_id.substring(0,8)}...</span></td>
        <td>${artifact.taxonomy}</td>
        <td>${artifact.summary}</td>
        <td><span class="status-badge ${statusClass}">${artifact.status}</span></td>
        <td>${artifact.operation_cost || 0}</td>
      `;
      tbody.appendChild(tr);
    });
  },

  toggleSelectAll: function(checkbox) {
    appState.selectAll(checkbox.checked);
    this.renderGrid();
    this.updateBulkEstimate();
  },

  toggleRowSelection: function(id, event) {
    event.stopPropagation();
    appState.toggleSelection(id);
    this.updateBulkEstimate();
  },


  saveCorrespondentRules: function() {
    const id = document.getElementById('edit-corr-id').value;
    const rules = document.getElementById('corr-extraction-rules').value;
    if(!id) return this.showToast("Please enter a Correspondent ID.");
    
    this.showToast("Saving rules...");
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success) this.showToast("Correspondent rules saved.");
        else this.showToast("Failed to save rules: " + (result.error || "Unknown"));
      })
      .withFailureHandler((err) => this.showToast("Error: " + err.message))
      .updateEntityRules('correspondents', id, rules);
  },

  savePurposeRules: function() {
    const id = document.getElementById('edit-purp-id').value;
    const rules = document.getElementById('purp-extraction-rules').value;
    const autoArchive = document.getElementById('purp-auto-archive').checked;
    if(!id) return this.showToast("Please enter a Purpose ID.");
    
    this.showToast("Saving rules...");
    google.script.run
      .withSuccessHandler((result) => {
        if(result && result.success) this.showToast("Purpose rules saved.");
        else this.showToast("Failed to save rules: " + (result.error || "Unknown"));
      })
      .withFailureHandler((err) => this.showToast("Error: " + err.message))
      .updateEntityRules('purposes', id, rules, autoArchive);
  },

  bulkEdit: function() {
    if (appState.selectedIds.size === 0) {
      this.showToast("No artifacts selected for bulk edit.");
      return;
    }
    
    this.openManualReviewModal();
  },

  openManualReviewModal: function() {
    const modal = document.getElementById('manual-review-modal');
    const select = document.getElementById('review-purpose');
    select.innerHTML = '';
    
    let globalHtml = '<optgroup label="Global Purposes">';
    let specificHtml = '<optgroup label="Category-Specific">';
    
    // Parse taxonomy tree
    Object.keys(appState.taxonomyTree).forEach(cat => {
      Object.keys(appState.taxonomyTree[cat]).forEach(corr => {
        appState.taxonomyTree[cat][corr].forEach(purp => {
           if (typeof purp === 'object') {
             if (purp.is_global) {
               if(!globalHtml.includes('value="' + purp.name + '"')) {
                 globalHtml += `<option value="${purp.name}">${purp.name}</option>`;
               }
             } else {
               specificHtml += `<option value="${purp.name}">${purp.name} (${cat} / ${corr})</option>`;
             }
           } else {
             specificHtml += `<option value="${purp}">${purp} (${cat} / ${corr})</option>`;
           }
        });
      });
    });
    
    globalHtml += '</optgroup>';
    specificHtml += '</optgroup>';
    
    select.innerHTML = globalHtml + specificHtml;
    modal.style.display = 'block';
  },

  submitManualReview: function() {
    const modal = document.getElementById('manual-review-modal');
    const select = document.getElementById('review-purpose');
    const newPurpose = select.value;
    
    if (!newPurpose) return;

    modal.style.display = 'none';

    const payload = {
      artifact_ids: Array.from(appState.selectedIds),
      metadata: { status: "PROCESSED", purpose: newPurpose }
    };
    
    this.showToast("Submitting bulk update...");
    google.script.run
      .withSuccessHandler((result) => {
        if(result.success) {
          this.showToast("Bulk edit successful.");
          // Update local state mock for immediate feedback
          payload.artifact_ids.forEach(id => {
            const art = appState.getArtifact(id);
            if(art) art.status = newStatus;
          });
          appState.selectedIds.clear();
          document.getElementById('select-all').checked = false;
          this.renderGrid();
          appActions.renderDetailsPane();
        } else {
          this.showToast("Bulk Edit Failed: " + result.error);
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .bulkUpdateArtifacts(payload);
  },

  materializeSelected: function() {
    if (appState.selectedIds.size === 0) {
      this.showToast("No artifacts selected for materialization.");
      return;
    }
    
    document.getElementById('workflow-hub-modal').style.display = 'none';
    this.showToast("Queueing materialization pipeline...");
    
    const payload = {
      artifact_ids: Array.from(appState.selectedIds)
    };
    
    google.script.run
      .withSuccessHandler((result) => {
        if(result.success) {
          this.showToast(result.data.message || "Materialization Queued.");
          appState.selectedIds.clear();
          document.getElementById('select-all').checked = false;
          this.renderGrid();
        } else {
          this.showToast("Materialization Failed: " + result.error);
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
      })
      .materializeSelectedItems(payload);
  },

  runSandbox: function() {
    const artifactId = document.getElementById('sandbox-artifact-id').value;
    const promptString = document.getElementById('sandbox-prompt').value;
    const outputElement = document.getElementById('sandbox-output');
    
    if (!artifactId || !promptString) {
      this.showToast("Artifact ID and Prompt are required.");
      return;
    }
    
    outputElement.textContent = "Running prompt... please wait.";
    this.showToast("Executing sandbox prompt...");
    
    const payload = { artifact_id: artifactId, prompt_string: promptString };
    
    google.script.run
      .withSuccessHandler((result) => {
        if(result.success) {
          this.showToast("Sandbox execution successful.");
          outputElement.textContent = JSON.stringify(result.data.result, null, 2);
        } else {
          this.showToast("Sandbox Execution Failed: " + result.error);
          outputElement.textContent = "Error: " + result.error;
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message);
        outputElement.textContent = "Error: " + error.message;
      })
      .runSandboxPrompt(payload);
  },

  askAI: function() {
    const inputEl = document.getElementById('chat-input');
    const historyEl = document.getElementById('chat-history');
    const question = inputEl.value.trim();
    if (!question) return;

    // Remove placeholder
    const placeholder = historyEl.querySelector('.placeholder-text');
    if (placeholder) placeholder.remove();

    // Add User Message
    const userMsg = document.createElement('div');
    userMsg.style.cssText = "align-self: flex-end; background: #e3f2fd; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 80%;";
    userMsg.textContent = "You: " + question;
    historyEl.appendChild(userMsg);

    inputEl.value = '';
    historyEl.scrollTop = historyEl.scrollHeight;

    // Add Loading Indicator
    const aiLoading = document.createElement('div');
    aiLoading.style.cssText = "align-self: flex-start; background: #f5f5f5; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 80%; color: #666;";
    aiLoading.textContent = "AI is thinking...";
    historyEl.appendChild(aiLoading);
    historyEl.scrollTop = historyEl.scrollHeight;

    const payload = { question: question };
    
    google.script.run
      .withSuccessHandler((result) => {
        aiLoading.remove();
        const aiMsg = document.createElement('div');
        aiMsg.style.cssText = "align-self: flex-start; background: #f5f5f5; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 80%;";
        if(result.success) {
          aiMsg.textContent = "AI: " + result.data.answer;
        } else {
          aiMsg.textContent = "Error: " + result.error;
          aiMsg.style.color = "red";
        }
        historyEl.appendChild(aiMsg);
        historyEl.scrollTop = historyEl.scrollHeight;
      })
      .withFailureHandler((error) => {
        aiLoading.remove();
        const aiMsg = document.createElement('div');
        aiMsg.style.cssText = "align-self: flex-start; background: #ffebee; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 80%; color: red;";
        aiMsg.textContent = "Apps Script Error: " + error.message;
        historyEl.appendChild(aiMsg);
        historyEl.scrollTop = historyEl.scrollHeight;
      })
      .runAskAI(payload);
  },

  renderDetailsPane: function() {
    const pane = document.getElementById('details-view');
    const artifact = appState.getArtifact(appState.selectedArtifactId);

    if (!artifact) {
      pane.innerHTML = `<p class="placeholder-text">Select an item to view details</p>`;
      return;
    }

    let customDataRows = '';
    if (artifact.custom_data) {
      Object.entries(artifact.custom_data).forEach(([key, value]) => {
        customDataRows += `
          <div class="detail-row">
            <span class="detail-label">${key}</span>
            <span class="detail-value">${JSON.stringify(value)}</span>
          </div>
        `;
      });
    }

    pane.innerHTML = `
      <div class="detail-group">
        <h4>Core Metadata</h4>
        <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value" style="font-family:monospace;">${artifact.artifact_id}</span></div>
        <div class="detail-row"><span class="detail-label">Taxonomy</span><span class="detail-value">${artifact.taxonomy}</span></div>
        <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${artifact.status}</span></div>
      </div>
      <div class="detail-group">
        <h4>Summary</h4>
        <p style="font-size:0.875rem; line-height:1.4;">${artifact.summary}</p>
      </div>
      <div class="detail-group">
        <h4>Extracted Custom Data</h4>
        ${customDataRows || '<p style="font-size:0.875rem; color:var(--text-secondary);">No custom data available.</p>'}
      </div>
      <div class="detail-group" style="display:flex; gap:8px;">
         <button class="btn btn-primary" onclick="appActions.showToast('Feature coming soon')">View Native Document</button>
      </div>
    `;
  },

  renderTimeline: function() {
    const timeline = document.getElementById('audit-timeline');
    timeline.innerHTML = '';

    if(appState.history.length === 0) {
      timeline.innerHTML = '<p class="placeholder-text">No audit history available.</p>';
      return;
    }

    appState.history.forEach(log => {
      const date = new Date(log.timestamp * 1000).toLocaleString();
      const li = document.createElement('li');
      li.className = 'timeline-event';
      
      let icon = 'auto_awesome';
      if(log.actor === 'USER') icon = 'person';
      
      li.innerHTML = `
        <div class="timeline-icon"><i class="material-icons">${icon}</i></div>
        <div class="timeline-content">
          <div class="timeline-header">
            <span class="timeline-actor">${log.actor}</span>
            <span class="timeline-date">${date}</span>
          </div>
          <div class="timeline-action">${log.action_type} on <code>${log.artifact_id}</code></div>
          <div class="timeline-diff">
            <strong>Changes:</strong><br/>
            ${JSON.stringify(log.new_state, null, 2)}
          </div>
        </div>
      `;
      timeline.appendChild(li);
    });
  },

  triggerDiagnostics: function() {
    this.showToast("Running diagnostics... Check VM logs if it fails.");
    google.script.run
      .withSuccessHandler((result) => {
        if(result.success) {
          this.showToast("Diagnostics Passed! See Drive for JSON.", 5000);
        } else {
          this.showToast("Diagnostics Failed: " + result.error, 5000);
        }
      })
      .withFailureHandler((error) => {
        this.showToast("Apps Script Error: " + error.message, 5000);
      })
      .runSystemDiagnostics();
  }

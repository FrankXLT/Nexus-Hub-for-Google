      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-header">
          <h2>Nexus Hub</h2>
        </div>
        <ul class="nav-list">
          <li class="nav-item active" onclick="appState.switchTab('grid', event)">
            <i class="material-icons">grid_view</i> Workspace
          </li>
          <li class="nav-item" onclick="appState.switchTab('audit', event)">
            <i class="material-icons">history</i> Audit Timeline
          </li>

            <i class="material-icons">health_and_safety</i> Diagnostics

      <!-- Main Content Area -->
      <main class="main-content">

        <div id="tab-grid" class="tab-content active">

              <div class="pane-header">
                <h3>Data Grid</h3>
                <button class="btn btn-primary" onclick="appActions.refreshData()"><i class="material-icons">refresh</i> Refresh</button>
              </div>
              <div class="table-container">
                <table class="data-grid" id="data-grid">
                  <thead>
                    <tr>
                      <th>Artifact ID</th>
                      <th>Taxonomy / Correspondent</th>
                      <th>Summary</th>
                      <th>Status</th>
                      <th>Custom Data</th>
                    </tr>
                  </thead>
                  <tbody id="grid-body">
                    <!-- Dynamic Rows -->
                  </tbody>
                </table>
              </div>
            </div>
            <div class="pane pane-right resize-handle">
              <div class="pane-header">
                <h3>Details Preview</h3>
              </div>
              <div id="details-view" class="details-content">

            <ul class="timeline" id="audit-timeline">
              <!-- Dynamic Timeline Events -->
            </ul>
          </div>
        </div>
      </main>
    </div>

    <div id="toast" class="toast"></div>

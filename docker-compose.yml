version: '3.8'

services:
  nexus-api:
    build: .
    container_name: nexus_api
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nexus-sync-engine:
    build: .
    container_name: nexus_sync_engine
    command: python3 sync_engine.py
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import sqlite3; sqlite3.connect('nexus.db').cursor().execute('SELECT 1')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

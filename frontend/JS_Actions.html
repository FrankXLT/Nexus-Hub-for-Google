<script>
const appActions = {
    init: function() {
        this.renderVQB();
    },

    renderVQB: async function() {
        // Fetch heatmap data from the FastAPI Walled Garden
        const API_BASE = 'http://136.119.213.222:8000'; 
        
        try {
            const response = await fetch(`${API_BASE}/api/analytics/heatmap`);
            if (!response.ok) throw new Error('API unreachable');
            const data = await response.json();
            appState.heatmapData = data.heatmap;
        } catch (error) {
            console.warn("Backend not ready or unreachable. Using UI test data.", error);
            appState.heatmapData = this.generateDummyHeatmap();
        }

        this.drawHeatmapGrid();
    },

    drawHeatmapGrid: function() {
        const container = document.getElementById('vqb-heatmap');
        if (!container) return;
        
        container.innerHTML = ''; 
        
        // Tailwind 31-column grid constraint (Mobile: 4, Tablet: 10, Desktop: 31)
        container.className = 'grid grid-cols-4 md:grid-cols-10 lg:grid-cols-[repeat(31,minmax(0,1fr))] gap-1 p-4 rounded-lg bg-slate-900/50 border border-slate-700 mt-4';

        appState.heatmapData.forEach(day => {
            const cell = document.createElement('div');
            // Apply visual intensity based on artifact volume
            cell.className = `h-8 w-full rounded cursor-pointer transition-all duration-200 hover:scale-110 hover:ring-2 hover:ring-white ${this.getHeatmapColor(day.count)}`;
            cell.title = `${day.date}: ${day.count} artifacts`;
            
            // Interactivity: Clicking a cell stages a Temporal Chip in the Omnibox
            cell.onclick = () => {
                appActions.stageChip(`Date:${day.date}`);
            };
            
            container.appendChild(cell);
        });
    },

    getHeatmapColor: function(count) {
        // Spatial intelligence color mapping
        if (count === 0) return 'bg-slate-800/50';
        if (count < 5) return 'bg-blue-900';
        if (count < 15) return 'bg-blue-700';
        if (count < 30) return 'bg-blue-500';
        return 'bg-blue-400 shadow-[0_0_10px_rgba(96,165,250,0.5)]'; // High-density glow
    },

    stageChip: function(chipString) {
        // Finds the first text input in the DOM (The Omnibox)
        const input = document.querySelector('input[type="text"]'); 
        if (!input) return;

        let currentVal = input.value.trim();
        
        // Append logic: prevent exact duplicates
        if (!currentVal.includes(chipString)) {
            input.value = currentVal ? `${currentVal} AND ${chipString}` : chipString;
        }
        
        // Flash the input to confirm the visual query was received
        input.classList.add('ring-2', 'ring-blue-400');
        setTimeout(() => input.classList.remove('ring-2', 'ring-blue-400'), 300);
        input.focus();
    },

    // UI Test Generator - Delete once Python endpoint is live
    generateDummyHeatmap: function() {
        let dummy = [];
        let d = new Date();
        d.setDate(d.getDate() - 30); // Generate last 31 days
        for(let i=0; i<31; i++) {
            dummy.push({
                date: d.toISOString().split('T')[0],
                // Heavily weight towards zero to make density spikes obvious
                count: Math.random() > 0.6 ? Math.floor(Math.random() * 40) : 0 
            });
            d.setDate(d.getDate() + 1);
        }
        return dummy;
    }
};

// Trigger the render cycle when the DOM loads
document.addEventListener('DOMContentLoaded', () => {
    appActions.init();
});
</script>

<script>
var appActions = {
    init: function() {
        try {
            this.renderVQB();
            this.renderSankey();
            this.loadZeroTrustFlow();
            this.loadPipelineSettings();
            this.loadPulseTicker();
            this.loadQuotaStats();
            
            const omnibox = document.getElementById('omnibox-input');
            if (omnibox) {
                omnibox.addEventListener('keydown', this.executeGlobalSearch);
            }

            // Initialize Data Matrix
            this.loadDataMatrix(0);
            this.loadLegacyLabels();
        } catch (e) {
            console.error("Initialization sequence error:", e);
        }
    },

    toggleSidebar: function() {
        const sidebar = document.getElementById('sidebar');
        const texts = document.querySelectorAll('.sidebar-text');
        
        if (sidebar.classList.contains('w-64')) {
            sidebar.classList.remove('w-64');
            sidebar.classList.add('w-16');
            texts.forEach(t => t.classList.add('hidden', 'opacity-0'));
        } else {
            sidebar.classList.remove('w-16');
            sidebar.classList.add('w-64');
            texts.forEach(t => t.classList.remove('hidden', 'opacity-0'));
        }
    },

    switchView: function(viewId) {
        document.querySelectorAll('.view-section').forEach(el => {
            el.classList.add('hidden');
        });
        const target = document.getElementById(viewId);
        if (target) {
            target.classList.remove('hidden');
            appState.activeTab = viewId;

            if (viewId === 'tab-orchestrator' && window.mermaid) {
                try {
                    mermaid.run();
                } catch(e) { console.warn("Mermaid re-render suppressed:", e); }
            }
        } else {
            console.error("ROUTER ERROR: Missing container ID:", viewId);
        }
    },

    loadQuotaStats: function() {
        google.script.run
            .withSuccessHandler((response) => {
                if (response && response.limits) {
                    const remaining = response.limits.daily_limit - (response.usage.daily_usage || 0);
                    const elQuota = document.getElementById('stat-quota-remaining');
                    const elReserve = document.getElementById('stat-priority-reserve');
                    if (elQuota) elQuota.innerText = remaining.toLocaleString();
                    if (elReserve) elReserve.innerText = "2,000";
                }
            })
            .withFailureHandler((err) => console.error("Quota Fetch Error:", err))
            .sendToNexusVM('/api/telemetry/quota', {}, 'GET');
    },

    loadPulseTicker: function() {
        const fetchPulse = () => {
            google.script.run
                .withSuccessHandler((response) => {
                    if (response && response.success && response.data) {
                        const elEmails = document.getElementById('pulse-emails');
                        const elContacts = document.getElementById('pulse-contacts');
                        const elQuar = document.getElementById('pulse-quarantine');

                        if(elEmails) elEmails.innerText = response.data.emails.toLocaleString();
                        if(elContacts) elContacts.innerText = response.data.contacts.toLocaleString();
                        if(elQuar) elQuar.innerText = response.data.quarantine.toLocaleString();
                    }
                })
                .getPulseData();
        };

        fetchPulse(); // Initial load
        setInterval(fetchPulse, 60000); // Refresh every 60 seconds
    }
}; // <--- THIS PROPERLY CLOSES THE appActions OBJECT

document.addEventListener('DOMContentLoaded', () => {
    appActions.init();
    if (typeof appActions.initOrchestrator === 'function') {
        appActions.initOrchestrator(); 
    }
});
</script>

<script>
var appActions = {
    init: function() {
        this.renderVQB();
        this.renderSankey();
        this.loadZeroTrustFlow();
    },

    toggleSidebar: function() {
        const sidebar = document.getElementById('sidebar');
        const texts = document.querySelectorAll('.sidebar-text');
        
        if (sidebar.classList.contains('w-64')) {
            sidebar.classList.remove('w-64');
            sidebar.classList.add('w-16');
            texts.forEach(t => t.classList.add('hidden', 'opacity-0'));
        } else {
            sidebar.classList.remove('w-16');
            sidebar.classList.add('w-64');
            texts.forEach(t => t.classList.remove('hidden', 'opacity-0'));
        }
    },

    switchTab: function(tabId) {
        const tabs = ['tab-home', 'tab-zero-trust', 'tab-orchestrator', 'tab-sandbox', 'tab-batch-ingestion'];
        tabs.forEach(t => {
            const el = document.getElementById(t);
            if(el) {
                if(t === tabId) {
                    el.classList.remove('hidden');
                    el.classList.add('block');
                    if(t === 'tab-home') el.classList.add('flex', 'flex-col', 'items-center', 'w-full');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('block', 'flex', 'flex-col', 'items-center', 'w-full');
                }
            }
        });
        appState.activeTab = tabId;
    },

    previewBatch: function() {
        const queryEl = document.getElementById('batch-query');
        const query = queryEl ? queryEl.value : '';
        const tbody = document.getElementById('batch-table-body');
        
        if (!query) {
            alert("Please enter a search query.");
            return;
        }
        
        tbody.innerHTML = '<tr><td colspan="5" class="p-3 text-center text-[#023047]/50 italic animate-pulse">Scanning Gmail for unique senders...</td></tr>';
        
        google.script.run
            .withSuccessHandler(response => {
                if (response && response.success && response.data) {
                    appActions.renderBatchTable(response.data);
                } else {
                    const err = response ? (response.error || "Unknown Error") : "Failed";
                    tbody.innerHTML = `<tr><td colspan="5" class="p-3 text-center text-red-500 italic">Error: ${err}</td></tr>`;
                }
            })
            .withFailureHandler(err => {
                tbody.innerHTML = `<tr><td colspan="5" class="p-3 text-center text-red-500 italic">Fetch Failed: ${err.message || err}</td></tr>`;
            })
            .previewBatchQuery({ source: 'gmail', query: query });
    },

    renderBatchTable: function(data) {
        const tbody = document.getElementById('batch-table-body');
        tbody.innerHTML = '';
        let totalCost = 0;
        
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-3 text-center text-[#023047]/50 italic">No results found for this query.</td></tr>';
            document.getElementById('batch-est-cost').innerText = '0';
            return;
        }
        
        data.forEach((row, i) => {
            const cost = Math.max(1, Math.ceil(row.count / 50));
            totalCost += cost;
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors";
            tr.innerHTML = `
                <td class="p-3 border-b border-[#8ecae6]/20"><input type="checkbox" class="batch-checkbox rounded border-[#8ecae6]" data-index="${i}" data-sender="${row.sender}" checked></td>
                <td class="p-3 border-b border-[#8ecae6]/20 text-[#023047] font-semibold">${row.sender}</td>
                <td class="p-3 border-b border-[#8ecae6]/20 text-[#023047]">${row.count} items</td>
                <td class="p-3 border-b border-[#8ecae6]/20 text-[#219ebc] font-bold">${cost} API Call(s)</td>
                <td class="p-3 border-b border-[#8ecae6]/20 text-[#023047]/60" id="batch-status-${i}">Pending Preview</td>
            `;
            tbody.appendChild(tr);
        });
        
        document.getElementById('batch-est-cost').innerText = totalCost;
    },

    executeBatch: function() {
        const checkboxes = document.querySelectorAll('.batch-checkbox:checked');
        if (checkboxes.length === 0) {
            alert("Please select at least one batch to execute.");
            return;
        }
        
        checkboxes.forEach(cb => {
            const index = cb.getAttribute('data-index');
            const sender = cb.getAttribute('data-sender');
            const statusCell = document.getElementById(`batch-status-${index}`);
            statusCell.innerHTML = `<span class="text-[#fb8500] font-bold animate-pulse">Processing...</span>`;
            
            // Dummy payload mapping array batching format
            const payload = {
                sender_string: sender,
                artifacts: [
                    { id: `mail_mock_${index}_1`, snippet: "Sample text 1" },
                    { id: `mail_mock_${index}_2`, snippet: "Sample text 2" }
                ]
            };
            
            google.script.run
                .withSuccessHandler(response => {
                    if(response && response.success && response.data && response.data.status === 'success') {
                        statusCell.innerHTML = `<span class="text-[#27AE60] font-bold">Success (${response.data.mapped} mapped)</span>`;
                    } else {
                        statusCell.innerHTML = `<span class="text-red-500 font-bold">Error</span>`;
                    }
                })
                .withFailureHandler(err => {
                    statusCell.innerHTML = `<span class="text-red-500 font-bold">Failed: ${err.message || err}</span>`;
                })
                .executeBatchProcess(payload);
        });
    },

    toggleVQBView: function(viewName) {
        const heatmap = document.getElementById('vqb-heatmap');
        const sankey = document.getElementById('vqb-sankey');
        
        if (viewName === 'heatmap') {
            heatmap.classList.remove('hidden');
            heatmap.classList.add('grid');
            sankey.classList.add('hidden');
        } else {
            heatmap.classList.add('hidden');
            heatmap.classList.remove('grid');
            sankey.classList.remove('hidden');
            this.renderSankey(); 
        }
        appState.activeVQB = viewName;
    },

    // --- HEATMAP MODULE (Live Data) ---
    renderVQB: function() {
        const container = document.getElementById('vqb-heatmap');
        if(!container) return;
        
        const days = document.getElementById('vqb-date-range') ? document.getElementById('vqb-date-range').value : 60;
        const source = document.getElementById('vqb-source') ? document.getElementById('vqb-source').value : 'All';
        const status = document.getElementById('vqb-status') ? document.getElementById('vqb-status').value : 'Active';

        container.innerHTML = '<div class="text-[#023047]/50 italic p-4 text-center w-full">Loading Activity Heatmap...</div>';

        google.script.run
            .withSuccessHandler(data => {
                if (!Array.isArray(data) || data.length === 0) {
                    container.innerHTML = '<div class="text-[#023047]/50 italic p-4 text-center w-full">No heatmap data found for these filters.</div>';
                    container.style.gridTemplateColumns = '1fr';
                    return;
                }

                // Try to determine the max days from the data, fallback to selected days
                let numDays = parseInt(days);
                if (data[0] && data[0].data) {
                    numDays = Math.max(numDays, data[0].data.length);
                }

                container.style.gridTemplateColumns = `max-content repeat(${numDays}, 20px)`;
                container.innerHTML = '';

                data.forEach(row => {
                    // Y-Axis Label for Sender
                    const label = document.createElement('div');
                    label.className = "flex items-center justify-end pr-3 text-xs font-bold text-[#023047]/70 whitespace-nowrap h-[20px]";
                    label.innerText = row.sender;
                    container.appendChild(label);

                    row.data.forEach(day => {
                        const cell = document.createElement('div');
                        cell.className = "w-[20px] h-[20px] rounded-[2px] cursor-pointer transition-all duration-150 hover:scale-125 hover:ring-2 hover:ring-[#023047] hover:z-10 relative";
                        cell.title = `${row.sender} on ${day.date}: ${day.count} items`;

                        if (day.count === 0) {
                            cell.classList.add('bg-slate-200'); 
                        } else if (day.count < 5) {
                            cell.classList.add('bg-[#8ecae6]'); 
                        } else if (day.count < 12) {
                            cell.classList.add('bg-[#219ebc]'); 
                        } else {
                            cell.classList.add('bg-[#fb8500]'); 
                        }

                        cell.onclick = () => {
                            appActions.stageChip(`Entity:"${row.sender}" AND Date:${day.date}`);
                        };

                        container.appendChild(cell);
                    });
                });
            })
            .withFailureHandler(err => {
                container.innerHTML = `<div class="text-red-500 italic p-4 text-center w-full">Error loading heatmap: ${err.message || err}</div>`;
                container.style.gridTemplateColumns = '1fr';
            })
            .getHeatmapData(days, source, status);
    },

    // --- SANKEY MODULE (Live Data) ---
    renderSankey: function() {
        const container = document.getElementById('vqb-sankey');
        if (!container) return;
        
        const days = document.getElementById('vqb-date-range') ? document.getElementById('vqb-date-range').value : 60;
        const source = document.getElementById('vqb-source') ? document.getElementById('vqb-source').value : 'All';
        const status = document.getElementById('vqb-status') ? document.getElementById('vqb-status').value : 'Active';

        container.innerHTML = '<div class="text-[#023047]/50 italic p-4 text-center w-full">Loading Data Flow...</div>';

        google.script.run
            .withSuccessHandler(async links => {
                if (!Array.isArray(links) || links.length === 0) {
                    container.innerHTML = '<div class="text-[#023047]/50 italic p-4 text-center w-full">No flow data found for these filters.</div>';
                    return;
                }

                // 3x SCALING FIX: Force Mermaid to render the Sankey significantly larger (1200x800)
                let mermaidSyntax = "%%{init: {'sankey': {'width': 1200, 'height': 800}}}%%\nsankey-beta\n";
                links.forEach(link => {
                    const safeSource = link.source.replace(/,/g, '');
                    const safeTarget = link.target.replace(/,/g, '');
                    mermaidSyntax += `${safeSource},${safeTarget},${link.value}\n`;
                });
                
                container.innerHTML = `<div class="mermaid flex justify-center w-full">\n${mermaidSyntax}\n</div>`;
                
                if (window.mermaid) {
                    try {
                        await window.mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
                    } catch (e) {
                        console.error("Mermaid rendering failed:", e);
                        container.innerHTML = `<div class="text-red-500 italic p-4 text-center w-full">Mermaid Error: ${e.message}</div>`;
                    }
                }
            })
            .withFailureHandler(err => {
                container.innerHTML = `<div class="text-red-500 italic p-4 text-center w-full">Error loading flow: ${err.message || err}</div>`;
            })
            .getSankeyData(days, source, status);
    },
    
    refreshVQB: function() {
        if (appState.activeVQB === 'heatmap') {
            this.renderVQB();
        } else if (appState.activeVQB === 'sankey') {
            this.renderSankey();
        }
    },

    // --- UTILITIES ---
    stageChip: function(chipString) {
        const input = document.getElementById('omnibox-input') || document.querySelector('input[type="text"]'); 
        if (!input) return;

        let currentVal = input.value.trim();
        if (!currentVal.includes(chipString)) {
            input.value = currentVal ? `${currentVal} AND ${chipString}` : chipString;
        }
        input.focus();
    },

    openSettingsModal: function() {
        document.getElementById('settings-modal').showModal();
    },

    closeSettingsModal: function() {
        document.getElementById('settings-modal').close();
    },

    switchSettingsTab: function(tabId) {
        const tabs = ['settings-ingestion', 'settings-prompts', 'settings-legacy'];
        tabs.forEach(t => {
            const el = document.getElementById(t);
            if(el) {
                if(t === tabId) {
                    el.classList.remove('hidden');
                    el.classList.add('block');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('block');
                }
            }
        });
        
        const buttons = document.querySelectorAll('#settings-modal .flex.space-x-4 button');
        buttons.forEach(btn => {
            if (btn.getAttribute('onclick').includes(tabId)) {
                btn.className = "px-4 py-2 border-b-2 border-[#219ebc] text-[#219ebc] font-semibold";
            } else {
                btn.className = "px-4 py-2 border-b-2 border-transparent text-[#023047]/60 hover:text-[#219ebc]";
            }
        });
    },

    snapshotLegacyLabels: function() {
        const btn = document.getElementById('btn-snapshot-legacy') || document.querySelector('button[onclick="appActions.snapshotLegacyLabels()"]');
        const originalText = btn.innerText;
        btn.innerText = "Extracting & Profiling... (This may take a minute)";
        btn.disabled = true;

        google.script.run
            .withSuccessHandler(response => {
                if (response && response.success && response.data && response.data.status === 'success') {
                    const results = response.data.data || response.data.results || [];
                    this.renderLegacyLabelTable(results);
                    const commitBtn = document.getElementById('btn-commit-legacy');
                    if (commitBtn) commitBtn.classList.remove('hidden');
                } else {
                    const errorObj = response ? (response.error || (response.data && (response.data.error || JSON.stringify(response.data)))) : "Unknown error";
                    alert("Error: " + errorObj);
                }
                btn.innerText = "Take Snapshot";
                btn.disabled = false;
            })
            .withFailureHandler(err => {
                alert("Fetch failed: " + (err.message || err));
                btn.innerText = "Take Snapshot";
                btn.disabled = false;
            })
            .previewLegacyLabels();
    },

    renderLegacyLabelTable: function(data) {
        appState.legacyLabels = data;
        const tbody = document.getElementById('legacy-label-tbody') || document.querySelector('#legacy-labels-table tbody');
        tbody.innerHTML = '';

        google.script.run
            .withSuccessHandler(categories => {
                let catOptions = '';
                if (Array.isArray(categories)) {
                    catOptions = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                }

                data.forEach((lbl, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "border-t border-[#8ecae6]/40";

                    let selectHtml = `<select class="bg-white border border-[#8ecae6] rounded p-1 w-full" id="legacy-cat-${index}">
                        <option value="${lbl.proposed_category || ''}">${lbl.proposed_category || 'Uncategorized'}</option>
                        ${catOptions}
                    </select>`;

                    tr.innerHTML = `
                        <td class="p-2 border border-[#8ecae6]/40">${lbl.original_label || ''}</td>
                        <td class="p-2 border border-[#8ecae6]/40"><input type="checkbox" id="legacy-keep-${index}" checked class="rounded"> Keep</td>
                        <td class="p-2 border border-[#8ecae6]/40">${selectHtml}</td>
                        <td class="p-2 border border-[#8ecae6]/40">
                            <span class="bg-[#219ebc]/10 text-[#023047] font-bold text-xs px-2 py-1 rounded border border-[#219ebc]/20">
                                ${lbl.canonical_entity_name || 'Unknown'} <span class="opacity-50">(${lbl.workspace_alias || 'No Alias'})</span>
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .withFailureHandler(err => {
                console.error("Failed to load taxonomy tree for dropdowns", err);
            })
            .getTaxonomyTree();
    },

    executeLegacyLabels: function() {
        if (!appState.legacyLabels || appState.legacyLabels.length === 0) return;

        const approvedLabels = [];
        appState.legacyLabels.forEach((lbl, index) => {
            const keepCheck = document.getElementById(`legacy-keep-${index}`);
            if (keepCheck && keepCheck.checked) {
                const catSelect = document.getElementById(`legacy-cat-${index}`);
                lbl.proposed_category = catSelect ? catSelect.value : lbl.proposed_category;
                approvedLabels.push(lbl);
            }
        });

        if (approvedLabels.length === 0) {
            alert("No labels selected to keep.");
            return;
        }

        const payload = { results: approvedLabels, approved_labels: approvedLabels };
        
        google.script.run
            .withSuccessHandler(response => {
                if (response && response.success && response.data && response.data.status === 'success') {
                    alert("Taxonomy committed successfully!");
                    this.closeSettingsModal();
                    if (typeof this.triggerDiagnostics === 'function') {
                        this.triggerDiagnostics();
                    } else {
                        console.warn("triggerDiagnostics not found.");
                    }
                } else {
                    const errorObj = response ? (response.error || (response.data && (response.data.error || JSON.stringify(response.data)))) : "Unknown error";
                    alert("Error: " + errorObj);
                }
            })
            .withFailureHandler(err => {
                alert("Execution failed: " + (err.message || err));
            })
            .executeLegacyLabels(payload);
    },
    // --- ZERO TRUST MODULE ---
    loadZeroTrustFlow: function() {
        const container = document.getElementById('zt-taxonomy-flow');
        if (!container) return;

        container.innerHTML = '<div class="text-[#023047]/50 italic p-4 text-center w-full">Loading Taxonomy Tree...</div>';

        google.script.run
            .withSuccessHandler(data => {
                if (!Array.isArray(data) || data.length === 0) {
                    container.innerHTML = '<div class="text-[#023047]/50 italic p-4 text-center w-full">No taxonomy data available.</div>';
                    return;
                }

                container.innerHTML = '';
                
                data.forEach(category => {
                    let purposesHtml = '';
                    
                    if (category.purposes && category.purposes.length > 0) {
                        category.purposes.forEach(purpose => {
                            let entitiesHtml = '';
                            
                            if (purpose.entities && purpose.entities.length > 0) {
                                entitiesHtml = '<ul class="list-disc pl-5 mt-2">';
                                purpose.entities.forEach(entity => {
                                    entitiesHtml += `<li><span class="text-[#023047]">${entity.name || 'Unknown'}</span></li>`;
                                });
                                entitiesHtml += '</ul>';
                            } else {
                                entitiesHtml = '<div class="mt-2"><span class="text-slate-400 italic text-sm">Awaiting Day 1 Ingestion...</span></div>';
                            }
                            
                            purposesHtml += `
                                <div class="mb-4 p-4 border border-[#8ecae6]/50 rounded bg-white shadow-sm">
                                    <h5 class="font-bold text-[#fb8500] mb-2 cursor-pointer" onclick="window.handleNodeClick('${purpose.name}')">${purpose.name}</h5>
                                    ${entitiesHtml}
                                </div>
                            `;
                        });
                    } else {
                        purposesHtml = '<div class="text-slate-400 italic text-sm p-4">No purposes defined for this category.</div>';
                    }

                    container.innerHTML += `
                        <details class="group bg-white border border-[#8ecae6] w-full mb-4 shadow-sm rounded-md overflow-hidden" open>
                            <summary class="p-4 cursor-pointer list-none flex items-center border-b border-[#8ecae6]/50 text-[#219ebc] font-sans text-xl font-bold select-none hover:bg-slate-50 transition-colors">
                                <span class="mr-3 transition-transform group-open:rotate-90">▼</span> ${category.name}
                            </summary>
                            <div class="p-6 bg-slate-50/50">
                                ${purposesHtml}
                            </div>
                        </details>
                    `;
                });
            })
            .withFailureHandler(err => {
                container.innerHTML = `<div class="text-red-500 italic p-4 text-center w-full">Error loading taxonomy: ${err.message || err}</div>`;
            })
            .getTaxonomyTree();
    }
};

window.handleNodeClick = function(nodeId) {
    const drawer = document.getElementById('zt-drawer');
    if (!drawer) return;
    drawer.classList.remove('translate-x-full');
    drawer.innerHTML = `
        <div class="h-full flex flex-col bg-white text-[#023047]">
            <div class="p-4 border-b border-[#8ecae6]/50 flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold text-[#fb8500]">Edit Node Settings</h2>
                <button onclick="document.getElementById('zt-drawer').classList.add('translate-x-full')" class="text-[#8ecae6] hover:text-[#fb8500]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto">
                <label class="block text-sm font-bold mb-2">Entity Name</label>
                <input type="text" class="w-full bg-slate-50 border border-[#8ecae6] rounded p-2 mb-4 text-[#023047] focus:ring-2 focus:ring-[#219ebc] outline-none" value="${nodeId}">
                
                <label class="block text-sm font-bold mb-2 mt-4">Gmail Navigation Visibility</label>
                <select class="w-full bg-slate-50 border border-[#8ecae6] rounded p-2 mb-6 text-[#023047] focus:ring-2 focus:ring-[#219ebc] outline-none">
                    <option>Show Always</option>
                    <option>Hide</option>
                    <option>Show if Important</option>
                </select>

                <button class="w-full bg-[#219ebc] hover:bg-[#023047] text-white font-bold py-2 px-4 rounded transition-colors shadow-sm mt-4">Save Changes</button>
            </div>
        </div>
    `;
};

        this.loadPrompts();
    },

    loadPrompts: function() {
        google.script.run
            .withSuccessHandler(response => {
                if (response && response.success && response.data) {
                    if (document.getElementById('prompt-profiler-commercial')) {
                        document.getElementById('prompt-profiler-commercial').value = response.data['agent_profiler_commercial'] || '';
                    }
                    if (document.getElementById('prompt-classifier')) {
                        document.getElementById('prompt-classifier').value = response.data['agent_classifier'] || '';
                    }
                }
            })
            .withFailureHandler(err => {
                console.error("Failed to load prompts: ", err);
            })
            .getPrompts();
    },

    switchOrchestratorTab: function(pipeline) {
        const tabs = ['gmail', 'drive', 'contacts'];
        const chip = document.getElementById('omnibox-chip');
        const isDebug = document.getElementById('toggle-debug-mode') && document.getElementById('toggle-debug-mode').checked;
        
        if (chip) {
            chip.innerText = (isDebug ? "[DEBUG] " : "") + pipeline.toUpperCase();
        }

        tabs.forEach(t => {
            const settingsDiv = document.getElementById(`settings-${t}`);
            const btn = document.getElementById(`tab-btn-${t}`);
            
            if (t === pipeline) {
                if(settingsDiv) {
                    settingsDiv.classList.remove('hidden');
                    settingsDiv.classList.add('block');
                }
                if(btn) {
                    btn.classList.add('border-[#219ebc]', 'text-[#219ebc]');
                    btn.classList.remove('border-transparent', 'text-[#023047]/60');
                }
            } else {
                if(settingsDiv) {
                    settingsDiv.classList.add('hidden');
                    settingsDiv.classList.remove('block');
                }
                if(btn) {
                    btn.classList.remove('border-[#219ebc]', 'text-[#219ebc]');
                    btn.classList.add('border-transparent', 'text-[#023047]/60');
                }
            }
        });
        
        if (window.mermaid) {
            const target = document.getElementById('orchestrator-mermaid');
            if(target) {
                let graph = "";
                if(pipeline === 'gmail') graph = this.gmailGraphDef;
                else if(pipeline === 'drive') graph = this.driveGraphDef;
                else if(pipeline === 'contacts') graph = this.contactsGraphDef;
                
                target.innerHTML = '';
                mermaid.render(`graph-${pipeline}-render`, graph).then(({ svg }) => {
                    target.innerHTML = svg;
                }).catch(e => {
                    target.innerHTML = `<div class="text-red-500 p-4">Render Failed: ${e.message}</div>`;
                });
            }
        }
        appState.activePipeline = pipeline;
    },

    toggleDebugMode: function() {
        const toggle = document.getElementById('toggle-debug-mode');
        const container = document.getElementById('omnibox-container');
        const chip = document.getElementById('omnibox-chip');
        const input = document.getElementById('orchestrator-omnibox');
        const isDebug = toggle.checked;
        
        if (isDebug) {
            if(chip) {
                chip.classList.replace('bg-[#219ebc]', 'bg-red-500');
                if(!chip.innerText.startsWith('[DEBUG]')) chip.innerText = "[DEBUG] " + chip.innerText;
            }
            if(container) {
                container.classList.add('border-red-500', 'focus-within:ring-red-500', 'focus-within:border-red-500');
                container.classList.remove('border-[#8ecae6]', 'focus-within:ring-[#219ebc]', 'focus-within:border-[#219ebc]');
            }
            if(input) {
                input.placeholder = "Enter test artifact (e.g. mock_123) for isolated dry run...";
            }
        } else {
            if(chip) {
                chip.classList.replace('bg-red-500', 'bg-[#219ebc]');
                chip.innerText = chip.innerText.replace('[DEBUG] ', '');
            }
            if(container) {
                container.classList.remove('border-red-500', 'focus-within:ring-red-500', 'focus-within:border-red-500');
                container.classList.add('border-[#8ecae6]', 'focus-within:ring-[#219ebc]', 'focus-within:border-[#219ebc]');
            }
            if(input) {
                input.placeholder = "Enter Artifact ID (e.g. mail_12345)";
            }
        }
    },

    simulatePipeline: function() {
        const input = document.getElementById('orchestrator-omnibox');
        const artifactId = input ? input.value.trim() : "";
        if (!artifactId) {
            alert("Please enter an artifact ID.");
            return;
        }
        
        const pipeline = appState.activePipeline || 'gmail';
        
        google.script.run
            .withSuccessHandler(response => {
                if(response && response.success && response.data && response.data.status === 'success') {
                    alert("Simulation Successful! Trace saved to Drive.");
                } else {
                    const errorObj = response ? (response.error || (response.data && (response.data.detail || response.data.error || response.data.message || JSON.stringify(response.data)))) : "Unknown error";
                    alert("Simulation Error: " + errorObj);
                }
            })
            .withFailureHandler(err => {
                alert("Execution failed: " + (err.message || err));
            })
            .simulateOrchestrator({ artifact_id: artifactId, pipeline: pipeline });
    },

    savePipelineConfig: function() {
        const pipeline = appState.activePipeline || 'gmail';
        let settings_json = {};
        let is_enabled = false;

        if (pipeline === 'gmail') {
            is_enabled = document.getElementById('toggle-ingest-gmail') ? document.getElementById('toggle-ingest-gmail').checked : false;
            settings_json = {
                enabled: is_enabled,
                ai_confidence_threshold: document.getElementById('threshold-gmail') ? parseInt(document.getElementById('threshold-gmail').value, 10) : 80,
                ignore_calendar_invites: document.getElementById('gmail-bypass-ics') ? document.getElementById('gmail-bypass-ics').checked : false,
                ignore_system_labels: document.getElementById('gmail-bypass-system') ? document.getElementById('gmail-bypass-system').checked : false,
                domain_whitelist: document.getElementById('gmail-whitelist') ? document.getElementById('gmail-whitelist').value : "",
                max_thread_depth: document.getElementById('gmail-max-thread') ? parseInt(document.getElementById('gmail-max-thread').value, 10) : 5
            };
        } else if (pipeline === 'drive') {
            is_enabled = document.getElementById('toggle-ingest-drive') ? document.getElementById('toggle-ingest-drive').checked : false;
            settings_json = {
                enabled: is_enabled,
                ai_confidence_threshold: document.getElementById('threshold-drive') ? parseInt(document.getElementById('threshold-drive').value, 10) : 80,
                mime_type_blacklist: document.getElementById('drive-blacklist') ? document.getElementById('drive-blacklist').value : "",
                max_file_size_mb: document.getElementById('drive-max-size') ? parseFloat(document.getElementById('drive-max-size').value) : 10
            };
        } else if (pipeline === 'contacts') {
            is_enabled = document.getElementById('toggle-ingest-contacts') ? document.getElementById('toggle-ingest-contacts').checked : false;
            settings_json = { enabled: is_enabled };
        }

        google.script.run
            .withSuccessHandler(response => {
                if (response && response.success) {
                    alert(pipeline.toUpperCase() + " pipeline configuration saved successfully.");
                } else {
                    alert("Error saving " + pipeline.toUpperCase() + " config: " + (response ? response.error : "Unknown"));
                }
            })
            .withFailureHandler(err => {
                console.error("Failed to save config:", err);
                alert("RPC Failed: " + (err.message || err));
            })
            .savePipelineConfig({ pipeline: pipeline, is_enabled: is_enabled, settings_json: JSON.stringify(settings_json) });
    },



    runPipelineNow: function(pipelineName) {
        google.script.run
            .withSuccessHandler(response => {
                if (response && response.success && response.data && response.data.status === 'success') {
                    alert("Success: " + response.data.message);
                } else {
                    const errorObj = response ? (response.error || (response.data && (response.data.error || response.data.detail || JSON.stringify(response.data)))) : "Unknown error";
                    alert("Error starting pipeline: " + errorObj);
                }
            })
            .withFailureHandler(err => {
                alert("Failed to trigger pipeline: " + (err.message || err));
            })
            .runPipelineNow(pipelineName);
    },

    renderQuarantineBanner: function() {
        google.script.run
            .withSuccessHandler(response => {
                if (!response || !response.success || !response.data) return;
                
                const quarantineItems = response.data;
                const container = document.getElementById('quarantine-carousel-container');
                const carousel = document.getElementById('quarantine-carousel');
                const countSpan = document.getElementById('quarantine-count');

                if (quarantineItems.length === 0) {
                    if (container) container.classList.add('hidden');
                    return;
                }

                if (container) container.classList.remove('hidden');
                if (countSpan) countSpan.innerText = quarantineItems.length;
                if (carousel) carousel.innerHTML = '';

                quarantineItems.forEach(item => {
                    const icon = item.source === 'gmail' ? `<svg class="w-4 h-4 text-[#fb8500]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>` : 
                                                           `<svg class="w-4 h-4 text-[#219ebc]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`;
                    
                    let badgesHtml = (item.badges || []).map(b => `<span class="bg-[#ea580c]/10 text-[#9a3412] text-[10px] px-1.5 py-0.5 rounded border border-[#ea580c]/20 whitespace-nowrap">${b}</span>`).join('');

                    if (carousel) {
                        carousel.innerHTML += `
                            <div onclick="appActions.filterZeroTrustTree(${item.id}, '${item.entity}')" class="bg-white border border-[#ea580c]/30 rounded-md p-2 shadow-sm cursor-pointer hover:border-[#ea580c] hover:shadow-md transition-all min-w-[250px] shrink-0">
                                <div class="flex items-center gap-2 mb-1">
                                    ${icon} <span class="font-bold text-[#023047] text-sm truncate">${item.entity}</span>
                                </div>
                                <div class="flex flex-wrap gap-1 mt-2">
                                    ${badgesHtml}
                                </div>
                            </div>
                        `;
                    }
                });
            })
            .withFailureHandler(error => {
                console.error("Failed to fetch quarantine queue:", error);
            })
            .getQuarantineQueue();
    },

    filterZeroTrustTree: function(itemId, entityName) {
        document.getElementById('taxonomy-mode-label').innerText = `(Filtering: ${entityName})`;
        document.getElementById('btn-clear-filter').classList.remove('hidden');

        const targetedGraph = `flowchart LR
            classDef established fill:#f0fdf4,stroke:#22c55e,stroke-width:2px,color:#14532d,font-family:sans-serif,rx:6px,ry:6px
            classDef update fill:#eff6ff,stroke:#3b82f6,stroke-width:2px,stroke-dasharray: 5 5,color:#1e3a8a,font-family:sans-serif,rx:6px,ry:6px
            classDef new fill:#fef2f2,stroke:#ef4444,stroke-width:2px,stroke-dasharray: 5 5,color:#991b1b,font-family:sans-serif,rx:6px,ry:6px
            classDef ai_action fill:#fff7ed,stroke:#ea580c,stroke-width:2px,color:#9a3412,font-family:sans-serif,rx:6px,ry:6px
            
            C("Category: Business 🔍"):::established
            E("Entity: ${entityName} 🔍"):::update
            AI("AI Profiler\nfa:fa-globe Web Search Used"):::ai_action
            P("Proposed Purpose:\nContract 🔍"):::update

            C --- E
            E -.->|Consolidated context| AI
            AI -.->|High Confidence Guess| P`;

        if (window.mermaid) {
            mermaid.render('graph-filtered', targetedGraph).then(({ svg }) => {
                const target = document.getElementById('zt-taxonomy-flow');
                target.innerHTML = `<div class="bg-slate-50/50 p-6 rounded-lg border border-dashed border-[#8ecae6] w-full flex justify-center">${svg}</div>`;
                
                setTimeout(() => {
                    target.querySelectorAll('.node').forEach(node => {
                        node.style.cursor = 'pointer';
                        node.addEventListener('click', () => { window.handleNodeClick(node.id); });
                    });
                }, 100);
            });
        }
    },

    clearQuarantineFilter: function() {
        document.getElementById('taxonomy-mode-label').innerText = `(Global X-Ray)`;
        document.getElementById('btn-clear-filter').classList.add('hidden');
        this.loadZeroTrustFlow();
    },

    loadPulseTicker: function() {
        const fetchPulse = () => {
            google.script.run
                .withSuccessHandler((response) => {
                    if (response.success && response.data) {
                        const elEmails = document.getElementById('pulse-emails');
                        const elContacts = document.getElementById('pulse-contacts');
                        const elQuar = document.getElementById('pulse-quarantine');
                        
                        if(elEmails) elEmails.innerText = response.data.emails.toLocaleString();
                        if(elContacts) elContacts.innerText = response.data.contacts.toLocaleString();
                        if(elQuar) elQuar.innerText = response.data.quarantine.toLocaleString();
                    }
                })
                .getPulseData();
        };
        
        fetchPulse(); // Initial load
        setInterval(fetchPulse, 60000); // Refresh every 60 seconds
    }
});

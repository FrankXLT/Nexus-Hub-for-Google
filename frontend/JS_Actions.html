<script>
const appActions = {
    init: function() {
        this.renderVQB();
        this.renderSankey();
        this.loadZeroTrustFlow();
    },

    toggleSidebar: function() {
        const sidebar = document.getElementById('sidebar');
        const texts = document.querySelectorAll('.sidebar-text');
        
        if (sidebar.classList.contains('w-64')) {
            sidebar.classList.remove('w-64');
            sidebar.classList.add('w-16');
            texts.forEach(t => t.classList.add('hidden', 'opacity-0'));
        } else {
            sidebar.classList.remove('w-16');
            sidebar.classList.add('w-64');
            texts.forEach(t => t.classList.remove('hidden', 'opacity-0'));
        }
    },

    switchTab: function(tabId) {
        const tabs = ['tab-home', 'tab-zero-trust', 'tab-orchestrator', 'tab-sandbox'];
        tabs.forEach(t => {
            const el = document.getElementById(t);
            if(el) {
                if(t === tabId) {
                    el.classList.remove('hidden');
                    el.classList.add('block');
                    if(t === 'tab-home') el.classList.add('flex', 'flex-col', 'items-center', 'w-full');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('block', 'flex', 'flex-col', 'items-center', 'w-full');
                }
            }
        });
        appState.activeTab = tabId;
    },

    toggleVQBView: function(viewName) {
        const heatmap = document.getElementById('vqb-heatmap');
        const sankey = document.getElementById('vqb-sankey');
        
        if (viewName === 'heatmap') {
            heatmap.classList.remove('hidden');
            heatmap.classList.add('grid');
            sankey.classList.add('hidden');
        } else {
            heatmap.classList.add('hidden');
            heatmap.classList.remove('grid');
            sankey.classList.remove('hidden');
            this.renderSankey(); 
        }
        appState.activeVQB = viewName;
    },

    // --- HEATMAP MODULE (60 Days x 30 Senders) ---
    generateDummyHeatmapData: function() {
        let senders = [];
        for (let i = 1; i <= 30; i++) {
            senders.push("Sender " + i);
        }
        
        let matrix = [];
        senders.forEach(sender => {
            let daysData = [];
            let d = new Date();
            d.setDate(d.getDate() - 59); // 60 days total
            
            for(let i=0; i<60; i++) {
                daysData.push({
                    date: d.toISOString().split('T')[0],
                    count: Math.random() > 0.75 ? Math.floor(Math.random() * 20) : 0 
                });
                d.setDate(d.getDate() + 1);
            }
            matrix.push({ sender: sender, data: daysData });
        });
        return matrix;
    },

    renderVQB: function() {
        const data = this.generateDummyHeatmapData();
        const container = document.getElementById('vqb-heatmap');
        if(!container) return;

        // Force exactly 61 columns (1 auto-sized for the sender name, 60 fixed 20px squares)
        container.style.gridTemplateColumns = 'max-content repeat(60, 20px)';
        container.innerHTML = '';

        data.forEach(row => {
            // Y-Axis Label for Sender
            const label = document.createElement('div');
            label.className = "flex items-center justify-end pr-3 text-xs font-bold text-[#023047]/70 whitespace-nowrap h-[20px]";
            label.innerText = row.sender;
            container.appendChild(label);

            row.data.forEach(day => {
                const cell = document.createElement('div');
                cell.className = "w-[20px] h-[20px] rounded-[2px] cursor-pointer transition-all duration-150 hover:scale-125 hover:ring-2 hover:ring-[#023047] hover:z-10 relative";
                cell.title = `${row.sender} on ${day.date}: ${day.count} items`;

                if (day.count === 0) {
                    cell.classList.add('bg-slate-200'); 
                } else if (day.count < 5) {
                    cell.classList.add('bg-[#8ecae6]'); 
                } else if (day.count < 12) {
                    cell.classList.add('bg-[#219ebc]'); 
                } else {
                    cell.classList.add('bg-[#fb8500]'); 
                }

                cell.onclick = () => {
                    appActions.stageChip(`Entity:"${row.sender}" AND Date:${day.date}`);
                };

                container.appendChild(cell);
            });
        });
    },

    // --- SANKEY MODULE ---
    generateDummyLinks: function() {
        return [
            {"source": "Gmail", "target": "Personal Network", "value": 45},
            {"source": "Gmail", "target": "Commercial", "value": 80},
            {"source": "Drive", "target": "System", "value": 20},
            {"source": "Personal Network", "target": "Nick Green", "value": 15},
            {"source": "Personal Network", "target": "Scott Davis", "value": 30},
            {"source": "Commercial", "target": "Home Depot", "value": 50},
            {"source": "Nick Green", "target": "Project Planning", "value": 10},
            {"source": "Home Depot", "target": "Receipt / Invoice", "value": 45}
        ];
    },

    renderSankey: async function() {
        const container = document.getElementById('vqb-sankey');
        if (!container) return;

        const links = this.generateDummyLinks();

        // 3x SCALING FIX: Force Mermaid to render the Sankey significantly larger (1200x800)
        let mermaidSyntax = "%%{init: {'sankey': {'width': 1200, 'height': 800}}}%%\nsankey-beta\n";
        links.forEach(link => {
            const safeSource = link.source.replace(/,/g, '');
            const safeTarget = link.target.replace(/,/g, '');
            mermaidSyntax += `${safeSource},${safeTarget},${link.value}\n`;
        });
        
        container.innerHTML = `<div class="mermaid flex justify-center w-full">\n${mermaidSyntax}\n</div>`;
        
        if (window.mermaid) {
            try {
                await window.mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
            } catch (e) {
                console.error("Mermaid rendering failed:", e);
            }
        }
    },

    // --- UTILITIES ---
    stageChip: function(chipString) {
        const input = document.getElementById('omnibox-input') || document.querySelector('input[type="text"]'); 
        if (!input) return;

        let currentVal = input.value.trim();
        if (!currentVal.includes(chipString)) {
            input.value = currentVal ? `${currentVal} AND ${chipString}` : chipString;
        }
        input.focus();
    },

    openSettingsModal: function() {
        document.getElementById('settings-modal').showModal();
    },

    closeSettingsModal: function() {
        document.getElementById('settings-modal').close();
    },

    switchSettingsTab: function(tabId) {
        const tabs = ['settings-ingestion', 'settings-prompts', 'settings-legacy'];
        tabs.forEach(t => {
            const el = document.getElementById(t);
            if(el) {
                if(t === tabId) {
                    el.classList.remove('hidden');
                    el.classList.add('block');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('block');
                }
            }
        });
        
        const buttons = document.querySelectorAll('#settings-modal .flex.space-x-4 button');
        buttons.forEach(btn => {
            if (btn.getAttribute('onclick').includes(tabId)) {
                btn.className = "px-4 py-2 border-b-2 border-[#219ebc] text-[#219ebc] font-semibold";
            } else {
                btn.className = "px-4 py-2 border-b-2 border-transparent text-[#023047]/60 hover:text-[#219ebc]";
            }
        });
    },

    snapshotLegacyLabels: function() {
        appState.legacyLabels = [
            { old: "Receipts-2023", keep: false, mapTo: "Receipt / Invoice" },
            { old: "Newsletters", keep: false, mapTo: "Commercial" },
            { old: "Tax Docs", keep: true, mapTo: "Finance" }
        ];
        appState.labelSnapshotTaken = true;
        
        const tbody = document.querySelector('#legacy-labels-table tbody');
        tbody.innerHTML = '';
        appState.legacyLabels.forEach(lbl => {
            const tr = document.createElement('tr');
            tr.className = "border-t border-[#8ecae6]/40";
            tr.innerHTML = `
                <td class="p-2 border border-[#8ecae6]/40">${lbl.old}</td>
                <td class="p-2 border border-[#8ecae6]/40"><input type="checkbox" ${lbl.keep ? 'checked' : ''} class="rounded"> Keep</td>
                <td class="p-2 border border-[#8ecae6]/40"><select class="bg-white border border-[#8ecae6] rounded p-1 w-full"><option>${lbl.mapTo}</option><option>Personal Network</option></select></td>
            `;
            tbody.appendChild(tr);
        });
    },

    // --- ZERO TRUST MODULE ---
    loadZeroTrustFlow: function() {
        const container = document.getElementById('zt-taxonomy-flow');
        if (!container) return;

        const graphDefinition = `flowchart LR
    classDef default fill:#ffffff,stroke:#219ebc,stroke-width:2px,color:#023047,font-family:sans-serif,rx:6px,ry:6px
    
    E1("Entity #1") --- S11("Sub Entity #1")
    S11 --- P11("Purpose")
    
    E2("Entity #2") --- S21("Sub Entity #1")
    E2 --- S22("Sub Entity #2")
    S21 --- P21("Purpose")
    S22 --- P22("Purpose")
    S22 --- P23("Purpose")
    
    E1 --> n1("None")
    n1 --> n2("Purpose")
    
    E3("Entity #3") --- n3("None")
    n3 --- P31("Purpose")
    n3 --- P32("Purpose")`;

        container.innerHTML = `
            <details class="group bg-white border border-[#8ecae6] w-full mb-4 shadow-sm rounded-md overflow-hidden" open>
                <summary class="p-4 cursor-pointer list-none flex items-center border-b border-[#8ecae6]/50 text-[#fb8500] font-sans text-xl font-bold select-none hover:bg-slate-50 transition-colors">
                    <span class="mr-3 transition-transform group-open:rotate-90">▽</span> Entity Category #1
                </summary>
                <div class="p-6 overflow-x-auto bg-slate-50/50">
                    <div id="mermaid-render-target" class="flex justify-start min-w-[800px] mb-6"></div>
                    
                    <div class="mt-4 pt-4 border-t border-[#8ecae6]/50 flex items-center gap-4">
                        <span class="text-sm text-[#023047]/70 font-bold uppercase tracking-wider">Category Purposes:</span>
                        <div class="px-4 py-1.5 bg-white border border-[#219ebc] text-[#219ebc] font-semibold rounded cursor-pointer hover:bg-[#219ebc] hover:text-white transition-colors text-sm shadow-sm" onclick="window.handleNodeClick('Category Purpose')">Category Purpose</div>
                        <div class="px-4 py-1.5 bg-white border border-[#219ebc] text-[#219ebc] font-semibold rounded cursor-pointer hover:bg-[#219ebc] hover:text-white transition-colors text-sm shadow-sm" onclick="window.handleNodeClick('Universal Purpose')">Universal Purpose</div>
                    </div>
                </div>
            </details>
        `;

        const target = document.getElementById('mermaid-render-target');
        
        if (window.mermaid) {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'default',
                securityLevel: 'loose',
                flowchart: { curve: 'linear' }
            });

            mermaid.render('preparedScheme', graphDefinition).then(({ svg }) => {
                target.innerHTML = svg;
                const nodes = target.querySelectorAll('.node');
                nodes.forEach(node => {
                    node.style.cursor = 'pointer';
                    node.addEventListener('mouseenter', () => node.style.opacity = '0.8');
                    node.addEventListener('mouseleave', () => node.style.opacity = '1');
                    node.addEventListener('click', () => { window.handleNodeClick(node.id); });
                });
            }).catch(err => {
                target.innerHTML = `<div class="text-red-500 p-4">Render Failed: ${err.message}</div>`;
            });
        }
    }
};

window.handleNodeClick = function(nodeId) {
    const drawer = document.getElementById('zt-drawer');
    if (!drawer) return;
    drawer.classList.remove('translate-x-full');
    drawer.innerHTML = `
        <div class="h-full flex flex-col bg-white text-[#023047]">
            <div class="p-4 border-b border-[#8ecae6]/50 flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold text-[#fb8500]">Edit Node Settings</h2>
                <button onclick="document.getElementById('zt-drawer').classList.add('translate-x-full')" class="text-[#8ecae6] hover:text-[#fb8500]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto">
                <label class="block text-sm font-bold mb-2">Entity Name</label>
                <input type="text" class="w-full bg-slate-50 border border-[#8ecae6] rounded p-2 mb-4 text-[#023047] focus:ring-2 focus:ring-[#219ebc] outline-none" value="${nodeId}">
                
                <label class="block text-sm font-bold mb-2 mt-4">Gmail Navigation Visibility</label>
                <select class="w-full bg-slate-50 border border-[#8ecae6] rounded p-2 mb-6 text-[#023047] focus:ring-2 focus:ring-[#219ebc] outline-none">
                    <option>Show Always</option>
                    <option>Hide</option>
                    <option>Show if Important</option>
                </select>

                <button class="w-full bg-[#219ebc] hover:bg-[#023047] text-white font-bold py-2 px-4 rounded transition-colors shadow-sm mt-4">Save Changes</button>
            </div>
        </div>
    `;
};

// --- Add these missing functions to appActions ---
Object.assign(appActions, {
    initOrchestrator: function() {
        const contactsGraph = `flowchart TB
            classDef trigger fill:#1e293b,stroke:#219ebc,stroke-width:2px,color:#fff,border-radius:8px
            classDef check fill:#0f172a,stroke:#ffb703,stroke-width:2px,color:#fff
            classDef action fill:#023047,stroke:#8ecae6,stroke-width:1px,color:#fff
            classDef ai fill:#0f172a,stroke:#fb8500,stroke-width:2px,color:#fff
            classDef endAction fill:#1e293b,stroke:#8ecae6,stroke-width:2px,color:#fff

            A(["Contacts API Polling Interval"]) ::: trigger --> B{"Has nexus-managed flag?"} ::: check
            B -- Yes --> C["Sync manual changes\nOverwrite DB"] ::: action
            B -- No --> D["Extract Metadata"] ::: action
            D --> E{"Is Workspace Directory?"} ::: check
            E -- Yes --> F["Extract Hierarchy"] ::: action
            F --> G["Deterministic DB Mapping"] ::: action
            E -- No --> H{"Domain Known?"} ::: check
            H -- No --> I["AI Prompt:\nProfile Domain"] ::: ai
            H -- Yes --> J{"Persona Known?"} ::: check
            I --> J
            J -- No --> K["AI Prompt:\nProfile Identity"] ::: ai
            J -- Yes --> L["Verify Mapping"] ::: action
            K --> L
            L --> M["Set DB Status: Quarantined"] ::: action
            G --> M
            M --> N["Inject hidden clientData"] ::: action
            C --> N
            N --> O(["Route to UI Quarantine Queue"]) ::: endAction`;

        const gmailGraph = `flowchart TB\nA["Gmail API"] --> B["LLM Router"]`;
        const driveGraph = `flowchart TB\nA["Drive API"] --> B["LLM Filer"]`;

        if (window.mermaid) {
            mermaid.render('graph-contacts', contactsGraph).then(({ svg }) => {
                document.getElementById('mermaid-contacts').innerHTML = svg;
                setTimeout(() => {
                    const node = document.querySelector('#mermaid-contacts [id^="flowchart-I-"]');
                    if(node) node.classList.add('active-node');
                }, 1000);
            });
            mermaid.render('graph-gmail', gmailGraph).then(({ svg }) => {
                document.getElementById('mermaid-gmail').innerHTML = svg;
            });
            mermaid.render('graph-drive', driveGraph).then(({ svg }) => {
                document.getElementById('mermaid-drive').innerHTML = svg;
            });
        }
        this.renderQuarantineBanner();
    },

    expandSwimlane: function(laneId) {
        const lanes = ['contacts', 'gmail', 'drive'];
        lanes.forEach(l => {
            const el = document.getElementById(`lane-${l}`);
            if (l === laneId) {
                el.classList.remove('collapsed', 'bg-[#f8fafc]', 'border-[#8ecae6]/50');
                el.classList.add('expanded', 'bg-white', 'border-[#8ecae6]');
                el.querySelector('.swimlane-title-vertical').classList.add('hidden');
            } else {
                el.classList.add('collapsed', 'bg-[#f8fafc]', 'border-[#8ecae6]/50');
                el.classList.remove('expanded', 'bg-white', 'border-[#8ecae6]');
                el.querySelector('.swimlane-title-vertical').classList.remove('hidden');
            }
        });
    },

    renderQuarantineBanner: function() {
        const quarantineItems = [
            { id: 1, source: 'gmail', entity: 'aerodynamics-inc.com', badges: ['fa-globe Web Search Used', 'Consolidated 2 Emails'] },
            { id: 2, source: 'contacts', entity: 'Nick Green (Workspace)', badges: ['Enterprise Bypass'] }
        ];

        const container = document.getElementById('quarantine-carousel-container');
        const carousel = document.getElementById('quarantine-carousel');
        const countSpan = document.getElementById('quarantine-count');

        if (quarantineItems.length === 0) {
            container.classList.add('hidden');
            return;
        }

        container.classList.remove('hidden');
        countSpan.innerText = quarantineItems.length;
        carousel.innerHTML = '';

        quarantineItems.forEach(item => {
            const icon = item.source === 'gmail' ? `<svg class="w-4 h-4 text-[#fb8500]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>` : 
                                                   `<svg class="w-4 h-4 text-[#219ebc]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`;
            
            let badgesHtml = item.badges.map(b => `<span class="bg-[#ea580c]/10 text-[#9a3412] text-[10px] px-1.5 py-0.5 rounded border border-[#ea580c]/20 whitespace-nowrap">${b}</span>`).join('');

            carousel.innerHTML += `
                <div onclick="appActions.filterZeroTrustTree(${item.id}, '${item.entity}')" class="bg-white border border-[#ea580c]/30 rounded-md p-2 shadow-sm cursor-pointer hover:border-[#ea580c] hover:shadow-md transition-all min-w-[250px] shrink-0">
                    <div class="flex items-center gap-2 mb-1">
                        ${icon} <span class="font-bold text-[#023047] text-sm truncate">${item.entity}</span>
                    </div>
                    <div class="flex flex-wrap gap-1 mt-2">
                        ${badgesHtml}
                    </div>
                </div>
            `;
        });
    },

    filterZeroTrustTree: function(itemId, entityName) {
        document.getElementById('taxonomy-mode-label').innerText = `(Filtering: ${entityName})`;
        document.getElementById('btn-clear-filter').classList.remove('hidden');

        const targetedGraph = `flowchart LR
            classDef established fill:#f0fdf4,stroke:#22c55e,stroke-width:2px,color:#14532d,font-family:sans-serif,rx:6px,ry:6px
            classDef update fill:#eff6ff,stroke:#3b82f6,stroke-width:2px,stroke-dasharray: 5 5,color:#1e3a8a,font-family:sans-serif,rx:6px,ry:6px
            classDef new fill:#fef2f2,stroke:#ef4444,stroke-width:2px,stroke-dasharray: 5 5,color:#991b1b,font-family:sans-serif,rx:6px,ry:6px
            classDef ai_action fill:#fff7ed,stroke:#ea580c,stroke-width:2px,color:#9a3412,font-family:sans-serif,rx:6px,ry:6px
            
            C("Category: Business 🔍"):::established
            E("Entity: ${entityName} 🔍"):::update
            AI("AI Profiler\nfa:fa-globe Web Search Used"):::ai_action
            P("Proposed Purpose:\nContract 🔍"):::update

            C --- E
            E -.->|Consolidated context| AI
            AI -.->|High Confidence Guess| P`;

        if (window.mermaid) {
            mermaid.render('graph-filtered', targetedGraph).then(({ svg }) => {
                const target = document.getElementById('zt-taxonomy-flow');
                target.innerHTML = `<div class="bg-slate-50/50 p-6 rounded-lg border border-dashed border-[#8ecae6] w-full flex justify-center">${svg}</div>`;
                
                setTimeout(() => {
                    target.querySelectorAll('.node').forEach(node => {
                        node.style.cursor = 'pointer';
                        node.addEventListener('click', () => { window.handleNodeClick(node.id); });
                    });
                }, 100);
            });
        }
    },

    clearQuarantineFilter: function() {
        document.getElementById('taxonomy-mode-label').innerText = `(Global X-Ray)`;
        document.getElementById('btn-clear-filter').classList.add('hidden');
        this.loadZeroTrustFlow();
    }
});

document.addEventListener('DOMContentLoaded', () => {
    appActions.init();
    appActions.initOrchestrator(); // Added initialization trigger
});
</script>

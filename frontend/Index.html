<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Intelligence Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            deepBlue: '#001A33',
            slateGrey: '#334155',
            academicGold: '#F3F0DF',
          }
        }
      }
    }
    // Initialize Mermaid
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
  </script>
  <style>
    /* Add basic dark mode text colors since we are using a dark theme palette */
    body {
      background-color: #001A33;
      color: #F3F0DF;
    }
  </style>
  <?!= include('CSS_Styles'); ?>
</head>
<body class="bg-deepBlue text-academicGold h-screen flex overflow-hidden font-sans">

  <!-- Sidebar -->
  <nav id="sidebar" class="w-64 bg-slateGrey flex-shrink-0 border-r border-gray-700 flex flex-col z-10">
    <div class="p-4 text-xl font-bold tracking-wider border-b border-gray-700">Nexus Dashboard</div>
    <ul class="flex-1 p-4 space-y-2">
      <li>
        <button onclick="appState.switchTab('tab-mission-control')" class="w-full text-left p-2 hover:bg-gray-600 rounded transition-colors focus:outline-none">Homepage</button>
      </li>
      <li>
        <button onclick="appState.switchTab('tab-zero-trust')" class="w-full text-left p-2 hover:bg-gray-600 rounded transition-colors flex justify-between items-center focus:outline-none">
          <span>Zero Trust Entity Management</span>
          <span class="badge bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full hidden" id="zero-trust-badge">0</span>
        </button>
      </li>
      <li>
        <button onclick="appState.switchTab('tab-pipeline-orchestrator')" class="w-full text-left p-2 hover:bg-gray-600 rounded transition-colors focus:outline-none">Pipeline Orchestrator</button>
      </li>
      <li>
        <button onclick="appState.switchTab('tab-prompt-sandbox')" class="w-full text-left p-2 hover:bg-gray-600 rounded transition-colors focus:outline-none">Prompt Sandbox</button>
      </li>
    </ul>
  </nav>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0">
    
    <!-- Omnibox (Search & Command) -->
    <header class="bg-slateGrey p-4 border-b border-gray-700 flex items-center shadow-md z-10">
      <div class="relative w-full max-w-3xl flex items-center bg-deepBlue rounded-md border border-gray-600 px-3 py-2 mx-auto lg:mx-0">
        <!-- S (Search) -->
        <button onclick="appActions.executeASTSearch(document.getElementById('ast-input').value)" class="text-gray-400 hover:text-academicGold mr-2 focus:outline-none" title="Search">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </button>
        
        <input type="text" id="ast-input" placeholder="Search & Command..." class="bg-transparent flex-1 outline-none text-academicGold placeholder-gray-500">
        
        <!-- B (Bookmarks) -->
        <button onclick="appActions.toggleBookmarks && appActions.toggleBookmarks()" class="text-gray-400 hover:text-academicGold ml-2 focus:outline-none" title="Bookmarks">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
        </button>
        
        <!-- A (Action/Quarantine) -->
        <button onclick="appActions.toggleChip(this, 'Purpose:Purpose/Review')" class="text-gray-400 hover:text-academicGold ml-2 focus:outline-none" title="Action/Quarantine">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>
        
        <!-- O (Options) -->
        <button onclick="appActions.toggleAdvancedSearch && appActions.toggleAdvancedSearch()" class="text-gray-400 hover:text-academicGold ml-2 focus:outline-none" title="Options">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
        </button>
        
        <!-- X (Clear) -->
        <button onclick="document.getElementById('ast-input').value=''; appActions.refreshData()" class="text-gray-400 hover:text-academicGold ml-2 focus:outline-none" title="Clear">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
    </header>

    <!-- Tabs Container -->
    <main class="flex-1 p-6 overflow-y-auto relative">
      
      <!-- Mission Control Tab -->
      <div id="tab-mission-control" class="tab-pane active">
        <h2 class="text-2xl font-semibold mb-4">Mission Control</h2>
        <!-- Heatmap -->
        <div class="mb-8">
          <h3 class="text-xl mb-2">Activity Heatmap</h3>
          <!-- Responsive CSS Grid for heatmap: grid-cols-4 mobile, lg:grid-cols-31 desktop -->
          <div id="heatmapChart" class="grid grid-cols-4 lg:grid-cols-31 gap-1"></div>
        </div>
        
        <!-- Sankey Chart (Mermaid) -->
        <div>
          <h3 class="text-xl mb-2">Data Flow</h3>
          <div id="sankey_chart" class="mermaid bg-slateGrey p-4 rounded-md"></div>
        </div>
      </div>

      <!-- Grid Tab (Not in sidebar, but requested) -->
      <div id="tab-grid" class="tab-pane hidden">
         <h2 class="text-2xl font-semibold mb-4">Data Grid</h2>
         <div id="grid-container"></div>
      </div>

      <!-- Zero Trust Tab -->
      <div id="tab-zero-trust" class="tab-pane hidden">
         <h2 class="text-2xl font-semibold mb-4">Zero Trust Entity Management</h2>
         <div id="zero-trust-queue" class="space-y-4"></div>
      </div>

      <!-- Pipeline Orchestrator Tab -->
      <div id="tab-pipeline-orchestrator" class="tab-pane hidden">
         <h2 class="text-2xl font-semibold mb-4">Pipeline Orchestrator</h2>
         <div id="pipeline-orchestrator-content">Content goes here...</div>
      </div>

      <!-- Prompt Sandbox Tab -->
      <div id="tab-prompt-sandbox" class="tab-pane hidden">
         <h2 class="text-2xl font-semibold mb-4">Prompt Sandbox</h2>
         <div id="prompt-sandbox-content">Content goes here...</div>
      </div>

    </main>
  </div>

  <!-- Slide-Out Context Panels -->
  
  <!-- Workspace Drawer -->
  <div id="workspace-context-drawer" class="fixed inset-y-0 right-0 w-full md:w-96 bg-slateGrey shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out border-l border-gray-700 z-50">
    <div class="p-4 flex justify-between items-center border-b border-gray-700">
      <h3 class="text-xl font-bold">Workspace Details</h3>
      <button onclick="appActions.closeContextDrawer()" class="text-gray-400 hover:text-academicGold focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="p-4 overflow-y-auto h-full pb-20">
      <div id="details-view"></div>
    </div>
  </div>

  <!-- Zero Trust Drawer -->
  <div id="zt-context-drawer" class="fixed inset-y-0 right-0 w-full md:w-96 bg-slateGrey shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out border-l border-gray-700 z-50">
    <div class="p-4 flex justify-between items-center border-b border-gray-700">
      <h3 class="text-xl font-bold">Zero Trust Details</h3>
      <button onclick="appActions.closeContextDrawer()" class="text-gray-400 hover:text-academicGold focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="p-4 overflow-y-auto h-full pb-20">
      <div id="zt-details-view"></div>
    </div>
  </div>

  <?!= include('JS_State'); ?>
  <?!= include('JS_Actions'); ?>
</body>
</html>
